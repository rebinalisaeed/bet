<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kurdliga</title>

  <style>
    @font-face {
      font-family: 'Kurdliga-Regular';
      src: url('fonts/kurdliga-Reg.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Kurdliga-Bold';
      src: url('fonts/kurdliga-bold.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #021133;
      font-family: 'Kurdliga-Regular', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
    }

    .splash {
      width: 100%;
      max-width: 430px;
      padding: 25px;
      text-align: center;
      animation: fadeIn 1s ease forwards;
    }

    .logo {
      width: min(78%, 330px);
      display: block;
      margin: 0 auto 28px;
      animation: logoPulse 2s infinite ease-in-out;
    }

    .slogan {
      font-size: 20px;
      color: #F5F7FA;
      margin-bottom: 34px;
      line-height: 1.8;
      animation: fadeText 2s ease infinite alternate;
    }

    .loader {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(245, 247, 250, 0.25);
      border-top-color: #00C853;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 18px;
      font-size: 16px;
      color: #BFC8D4;
    }

    .version {
      margin-top: 15px;
      color: #7A869A;
      font-size: 14px;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes logoPulse {
      0%,100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.04);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeText {
      from {
        opacity: 0.65;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-height:650px) {

      .logo {
        width: min(65%, 260px);
        margin-bottom: 18px;
      }

      .slogan {
        font-size: 17px;
        margin-bottom: 24px;
      }

      .loader {
        width: 38px;
        height: 38px;
      }

      .loading-text {
        font-size: 14px;
      }

      .version {
        font-size: 12px;
      }
    }
  

    /* =========================================================
       Kurdliga mobile browser normalization
       Keeps Chrome / Brave / Samsung Internet / Safari layout
       visually consistent with the Brave mobile design.
       ========================================================= */
    :root {
      --app-max-width: 560px;
      --app-header-height: 76px;
      --app-bottom-nav-height: 74px;
      --app-side-padding: 14px;
    }

    html {
      width: 100%;
      min-width: 320px;
      background: #021133;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-width: 320px;
      min-height: 100svh;
      min-height: 100dvh;
      background: #021133;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: none;
    }

    body.no-scroll {
      height: 100svh;
      height: 100dvh;
    }

    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }

    button, input, select, textarea {
      font: inherit;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .splash,
    .login-box,
    .register-box,
    .forgot-box {
      width: 100%;
      max-width: min(430px, calc(100vw - 44px));
      margin-inline: auto;
    }

    .header {
      height: var(--app-header-height);
      min-height: var(--app-header-height);
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      box-sizing: border-box;
    }

    body:has(.header) {
      padding-top: calc(var(--app-header-height) + env(safe-area-inset-top, 0px));
    }

    .logo {
      width: clamp(118px, 34vw, 145px);
      flex: 0 0 auto;
    }

    .wallet-mini {
      min-width: clamp(86px, 22vw, 104px);
      flex: 0 0 auto;
    }

    .coin-line,
    .diamond-line {
      font-size: clamp(15px, 4.2vw, 16px);
    }

    .menu-btn,
    .notify-btn,
    .live-filter-btn,
    .back-btn {
      width: clamp(40px, 11vw, 42px);
      height: clamp(40px, 11vw, 42px);
      flex: 0 0 auto;
    }

    .page,
    .slide-content {
      width: 100%;
      max-width: min(var(--app-max-width), calc(100vw - 28px));
      margin-inline: auto;
    }

    .page {
      padding-inline: var(--app-side-padding);
    }

    .ad-slider,
    .slide {
      min-height: clamp(145px, 26svh, 235px);
    }

    .date-banner,
    .date-item {
      height: clamp(70px, 12svh, 76px);
    }

    .date-title {
      font-size: clamp(16px, 4.4vw, 17px);
    }

    .date-sub {
      font-size: clamp(10px, 3vw, 11px);
    }

    .competition-card,
    .match-card,
    .archive-card,
    .search-box {
      width: 100%;
      max-width: 100%;
    }

    .competition-title {
      font-size: clamp(19px, 5.3vw, 22px);
    }

    .match-time-top,
    .match-time-row {
      font-size: clamp(24px, 7.2vw, 30px);
    }

    .match-time-row.live-time {
      font-size: clamp(30px, 8.6vw, 34px);
    }

    .team-side .team-name-inline,
    .team-name {
      font-size: clamp(16px, 4.5vw, 17px);
    }

    .points-row {
      gap: clamp(8px, 2.2vw, 10px);
    }

    .point-box {
      min-height: clamp(64px, 16vw, 78px);
      padding-inline: 6px;
    }

    .point-title {
      font-size: clamp(11px, 3.2vw, 12px);
    }

    .point-value {
      font-size: clamp(16px, 4.6vw, 18px);
    }

    .bottom-nav {
      height: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    body:has(.bottom-nav) {
      padding-bottom: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 14px);
    }

    .bet-slip-toggle {
      bottom: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 10px);
    }

    .bet-slip-panel {
      bottom: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 10px);
      max-height: calc(100dvh - var(--app-header-height) - var(--app-bottom-nav-height) - 30px);
    }

    .side-overlay,
    .side-menu {
      top: calc(var(--app-header-height) + env(safe-area-inset-top, 0px));
    }

    @media (max-width: 380px) {
      :root { --app-side-padding: 10px; }
      .header { padding-inline: 10px; }
      .logo { width: clamp(108px, 31vw, 132px); }
      .wallet-mini { min-width: 78px; }
      .header-left { gap: 6px; }
      .coin-line, .diamond-line { font-size: 14px; }
      .point-title { font-size: 10.5px; }
      .nav-item { font-size: 10.5px; }
      .nav-icon { font-size: 21px; }
    }

    @media (min-width: 700px) and (pointer: coarse) {
      :root { --app-max-width: 560px; }
      .page, .slide-content { max-width: 560px; }
    }

  </style>


  <script>
    // Normalize viewport units on mobile browsers whose address bars resize the page.
    (function () {
      function setKurdligaViewport() {
        document.documentElement.style.setProperty('--real-vh', (window.innerHeight * 0.01) + 'px');
      }
      setKurdligaViewport();
      window.addEventListener('resize', setKurdligaViewport, { passive: true });
      window.addEventListener('orientationchange', setKurdligaViewport, { passive: true });
    })();
  </script>

</head>

<body>

  <main class="splash">

    <img
      src="assets/images/logo.png"
      alt="Kurdliga Logo"
      class="logo"
    />

    <div class="slogan">
      یەکەمین ماڵپەری پێشبینی یاریەکان بە خۆڕایی
    </div>

    <div class="loader"></div>

    <div class="loading-text">
      تکایە چاوەڕێ بکە...
    </div>

    <div class="version">
      Version 1.0.0
    </div>

  </main>

  <script>
    setTimeout(() => {
      window.location.href = "login.html";
    }, 6000);
  </script>

</body>
</html>
