<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پێشبڕکێی خۆڕایی - مۆندیالی 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Tahoma', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2f1f 0%, #0a3b2a 100%);
            min-height: 100vh;
            padding: 1rem;
            color: #f5f2e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* header */
        .hero {
            text-align: center;
            padding: 1.5rem 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }

        .hero h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .countdown {
            background: #1e2a1f;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            margin-top: 0.8rem;
            font-weight: bold;
            border: 1px solid #ffb347;
        }

        /* بطاقات */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1f3629;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            text-align: center;
            flex: 1;
            min-width: 130px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-bottom: 3px solid #FFB347;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #FFD966;
        }

        /* جدول المباريات */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .match-card {
            background: #1f2a1b;
            border-radius: 1.5rem;
            padding: 1rem;
            transition: 0.2s;
            border: 1px solid #4a6741;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            background: #0e1e14;
            padding: 0.6rem;
            border-radius: 1rem;
            margin-bottom: 0.8rem;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .vs {
            background: #FFB347;
            color: #1f2a1b;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .bet-area {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin: 0.8rem 0;
        }

        .pick-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
        }

        .pick-btn {
            background: #2e4228;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.1s;
            font-weight: bold;
        }

        .pick-btn.active {
            background: #FFB347;
            color: #1e2a1f;
            box-shadow: 0 0 0 2px #ffd966;
        }

        .points-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .points-input input {
            width: 90px;
            padding: 0.3rem;
            border-radius: 1rem;
            border: none;
            text-align: center;
            font-weight: bold;
            background: #efe8d0;
        }

        .bet-btn {
            background: #2c7a47;
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .bet-btn:disabled {
            background: #5a5a4a;
            cursor: not-allowed;
        }

        /* رانكينگ */
        .rank-section {
            background: #10261b;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-top: 1rem;
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }

        .rank-table th, .rank-table td {
            padding: 0.7rem;
            text-align: center;
            border-bottom: 1px solid #3b5a3a;
        }

        .top3 {
            background: #f5b34220;
            font-weight: bold;
        }

        .fake-login {
            background: #2f4429;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .input-group input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 1rem;
            border: none;
        }

        button {
            background: #ffb347;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .user-points-badge {
            background: #1e2a1f;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 1.1rem;
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 1.6rem; }
            .matches-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🏆 پێشبڕکێی خۆڕایی مۆندیال 2026</h1>
        <p>1000 پۆینتی خۆڕایی هەموو ئەکاونتێک • بەبێ پارە • بەرزترین ڕانک ببەرەوە</p>
        <div class="countdown" id="countdownText"></div>
    </div>

    <!-- login / register fake (دیمۆ) -->
    <div class="fake-login">
        <div class="input-group">
            <label>ناوی بەکارهێنەر (تەنها لەم دیمۆدا)</label>
            <input type="text" id="usernameInput" placeholder="نمونە: Salah">
        </div>
        <button id="loginBtn">🔓 دەستپێکردن / گۆڕینی ئەکاونت</button>
        <div class="user-points-badge" id="pointsDisplay">⭐ 0 پۆینت</div>
    </div>

    <!-- ئامار -->
    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div>بەشداربوو</div></div>
        <div class="stat-card"><div class="stat-number" id="myRank">-</div><div>ڕیزبەندی من</div></div>
        <div class="stat-card"><div class="stat-number" id="totalBets">0</div><div>پێشبینی کراوە</div></div>
    </div>

    <!-- پێڕستی یاریەکان -->
    <h2>📅 یارییەکانی ڕۆژ (پێشبینی بکە)</h2>
    <div class="matches-grid" id="matchesContainer"></div>

    <!-- رانکینگ -->
    <div class="rank-section">
        <h2>🥇 ڕیزبەندی پێشەنگان</h2>
        <table class="rank-table" id="rankTable">
            <thead><tr><th>#</th><th>بەکارهێنەر</th><th>پۆینت</th></tr></thead>
            <tbody id="rankBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ---------------------------
    //  دیمۆی تەواو بۆ دیزاین + لۆجیکی سادە (بەبێ Firebase)
    //  لە کاتی ڕاستەقینەدا داتاکان دەچنە Firebase
    // ---------------------------
    let currentUser = null;
    let users = [];        // { id, name, points }
    let matches = [];
    let bets = [];         // { userId, matchId, pick, pointsBet }

    // دیتای نموونەیی سەرەتا
    function initDemoData() {
        // بەکارهێنەری default بۆ دیمۆ
        if(users.length === 0) {
            users.push({ id: "u1", name: "ئەحمەد", points: 1000 });
            users.push({ id: "u2", name: "سارا", points: 870 });
            users.push({ id: "u3", name: "ڕێبین", points: 1240 });
            users.push({ id: "u4", name: "ژینان", points: 560 });
        }
        // یارییەکان (تەنها چەند نموونەیەک بۆ مۆندیال)
        if(matches.length === 0) {
            matches = [
                { id: "m1", teamA: "بەڕازیل", teamB: "فەڕەنسا", date: "2026-06-11", status: "upcoming" },
                { id: "m2", teamA: "ئەرجەنتین", teamB: "ئەڵمانیا", date: "2026-06-12", status: "upcoming" },
                { id: "m3", teamA: "پورتوگال", teamB: "ئیسپانیا", date: "2026-06-13", status: "upcoming" },
                { id: "m4", teamA: "ئینگلتەرا", teamB: "ھۆڵەندا", date: "2026-06-14", status: "upcoming" },
                { id: "m5", teamA: "مەغریب", teamB: "کرواتیا", date: "2026-06-15", status: "upcoming" }
            ];
        }
        // هەندێک پێشبینی نموونەیی
        if(bets.length === 0 && users.length) {
            // ئەحمەد پێشبینی بەڕازیل
            bets.push({ userId: "u1", matchId: "m1", pick: "بەڕازیل", pointsBet: 200 });
            // سارا پێشبینی ئەرجەنتین
            bets.push({ userId: "u2", matchId: "m2", pick: "ئەرجەنتین", pointsBet: 150 });
        }
    }

    // هەڵگرتنی داتا لە LocalStorage بۆ ماوەی دیمۆ
    function saveData() {
        const data = { users, matches, bets };
        localStorage.setItem("worldCupBetDemo", JSON.stringify(data));
    }

    function loadData() {
        const raw = localStorage.getItem("worldCupBetDemo");
        if(raw) {
            try {
                const data = JSON.parse(raw);
                users = data.users || [];
                matches = data.matches || [];
                bets = data.bets || [];
            } catch(e) { initDemoData(); }
        } else {
            initDemoData();
        }
        // هەر users بوونی نەبوو
        if(users.length === 0) initDemoData();
    }

    // هەژمارکردنی رانک
    function getRankedUsers() {
        return [...users].sort((a,b) => b.points - a.points);
    }

    function updateUI() {
        // نمایش پۆینتی بەکارهێنەری ئێستا
        if(currentUser) {
            const userObj = users.find(u => u.id === currentUser.id);
            if(userObj) document.getElementById("pointsDisplay").innerHTML = `⭐ ${userObj.points} پۆینت`;
            else document.getElementById("pointsDisplay").innerHTML = `⭐ 0 پۆینت`;
        } else {
            document.getElementById("pointsDisplay").innerHTML = `⭐ 0 پۆینت (چالاک بکە)`;
        }

        // ژمارەی بەکارهێنەران
        document.getElementById("totalUsers").innerText = users.length;
        const totalBetsCount = bets.filter(b => b.userId === currentUser?.id).length;
        document.getElementById("totalBets").innerText = totalBetsCount;

        // ڕیزبەندی من
        if(currentUser) {
            const ranked = getRankedUsers();
            const pos = ranked.findIndex(u => u.id === currentUser.id) + 1;
            document.getElementById("myRank").innerText = pos ? pos : '-';
        } else {
            document.getElementById("myRank").innerText = '-';
        }

        // نمایش ڕانکینگ تەیبڵ
        const rankBody = document.getElementById("rankBody");
        const topUsers = getRankedUsers().slice(0, 10);
        rankBody.innerHTML = "";
        topUsers.forEach((u, idx) => {
            const tr = document.createElement("tr");
            if(idx < 3) tr.classList.add("top3");
            tr.innerHTML = `<td>${idx+1}</td><td>${u.name}</td><td>${u.points}</td>`;
            rankBody.appendChild(tr);
        });

        // دروستکردنی کارتەکانی یاری
        renderMatches();
        saveData();
    }

    function renderMatches() {
        const container = document.getElementById("matchesContainer");
        if(!container) return;
        container.innerHTML = "";
        matches.forEach(match => {
            const matchDiv = document.createElement("div");
            matchDiv.className = "match-card";

            const userBet = currentUser ? bets.find(b => b.userId === currentUser.id && b.matchId === match.id) : null;
            const selectedPick = userBet ? userBet.pick : "";

            matchDiv.innerHTML = `
                <div class="match-teams">
                    <div class="team">${match.teamA}</div>
                    <div class="vs">VS</div>
                    <div class="team">${match.teamB}</div>
                </div>
                <div class="bet-area">
                    <div class="pick-buttons">
                        <button class="pick-btn ${selectedPick === match.teamA ? 'active' : ''}" data-match="${match.id}" data-pick="${match.teamA}">🏅 ${match.teamA}</button>
                        <button class="pick-btn ${selectedPick === match.teamB ? 'active' : ''}" data-match="${match.id}" data-pick="${match.teamB}">🏅 ${match.teamB}</button>
                    </div>
                    <div class="points-input">
                        <span>📊 پۆینت بخە:</span>
                        <input type="number" id="points-${match.id}" min="10" max="${currentUser ? (users.find(u=>u.id===currentUser.id)?.points || 0) : 0}" value="${userBet ? userBet.pointsBet : 50}" placeholder="پۆینت">
                    </div>
                    <button class="bet-btn" data-match="${match.id}">✅ پێشبینی بکە / نوێ بکە</button>
                </div>
            `;

            container.appendChild(matchDiv);
        });

        // ئێستا ئیڤێنت بۆ هەموو دوگمەکان
        document.querySelectorAll(".bet-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                if(!currentUser) {
                    alert("تکایە یەکەمجار ناوی بەکارهێنەرێک هەڵبژێرە!");
                    return;
                }
                const matchId = btn.getAttribute("data-match");
                const match = matches.find(m => m.id === matchId);
                if(!match) return;
                const pickA = btn.parentElement.querySelector(".pick-btn:first-child");
                const pickB = btn.parentElement.querySelector(".pick-btn:nth-child(2)");
                let selectedPick = "";
                if(pickA.classList.contains("active")) selectedPick = match.teamA;
                else if(pickB.classList.contains("active")) selectedPick = match.teamB;
                else {
                    alert("هیچ تیمێکت هەڵنەبژاردووە بۆ پێشبینی!");
                    return;
                }
                const pointsInput = document.getElementById(`points-${matchId}`);
                let pointsVal = parseInt(pointsInput.value);
                const currentUserObj = users.find(u => u.id === currentUser.id);
                if(isNaN(pointsVal) || pointsVal < 10) pointsVal = 10;
                if(pointsVal > currentUserObj.points) {
                    alert(`پۆینتی تەنها ${currentUserObj.points} ماوە!`);
                    return;
                }

                // پێشبینی هەبوو بیگۆڕە یان زیاد بکە
                const existingBetIndex = bets.findIndex(b => b.userId === currentUser.id && b.matchId === matchId);
                if(existingBetIndex !== -1) {
                    const oldBet = bets[existingBetIndex];
                    // گەڕاندنەوەی پۆینتی کۆن (بۆ ئەوەی دووبارە زیاد نەبێت)
                    currentUserObj.points += oldBet.pointsBet;
                    bets.splice(existingBetIndex,1);
                }
                if(pointsVal > currentUserObj.points) {
                    alert("پۆینت بەردەست نیە دوای هەژمارکردن");
                    return;
                }
                currentUserObj.points -= pointsVal;
                bets.push({ userId: currentUser.id, matchId: matchId, pick: selectedPick, pointsBet: pointsVal });
                updateUI();
                alert(`پێشبینی تۆمارکرا: ${selectedPick} بە ${pointsVal} پۆینت`);
            });
        });

        // ئیڤێنت بۆ دوگمەکانی هەڵبژاردنی تیم (pick)
        document.querySelectorAll(".pick-btn").forEach(pickBtn => {
            pickBtn.addEventListener("click", (e) => {
                if(!currentUser) { alert("یەکەمجار ناو هەڵبژێرە"); return; }
                const matchCard = pickBtn.closest(".match-card");
                const btns = matchCard.querySelectorAll(".pick-btn");
                btns.forEach(btn => btn.classList.remove("active"));
                pickBtn.classList.add("active");
            });
        });
    }

    // چالاککردنی بەکارهێنەر
    function setUser(username) {
        if(!username.trim()) username = "میوان" + Math.floor(Math.random()*1000);
        let existing = users.find(u => u.name === username);
        if(existing) {
            currentUser = { id: existing.id, name: existing.name };
        } else {
            const newId = "u_" + Date.now() + "_" + Math.floor(Math.random()*10000);
            const newUser = { id: newId, name: username, points: 1000 };
            users.push(newUser);
            currentUser = { id: newId, name: username };
        }
        updateUI();
    }

    // کاونت داون
    function updateCountdown() {
        const worldCupStart = new Date(2026, 5, 11); // مانگی 6 (0-index)
        const now = new Date();
        const diff = worldCupStart - now;
        if(diff <= 0) {
            document.getElementById("countdownText").innerHTML = "🏆 مۆندیال دەستی پێکردووە! پێشبینی بکە";
            return;
        }
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff % (86400000))/3600000);
        document.getElementById("countdownText").innerHTML = `⏳ ماوە ${days} ڕۆژ و ${hours} کاتژمێر بۆ دەستپێکردن`;
    }

    document.getElementById("loginBtn").addEventListener("click", () => {
        const nameInput = document.getElementById("usernameInput").value.trim();
        if(nameInput === "") setUser("میوان" + Math.floor(Math.random()*900));
        else setUser(nameInput);
    });

    // هەڵگرتنی لۆجین لە ریلۆددا
    if(localStorage.getItem("lastUser")) {
        const last = localStorage.getItem("lastUser");
        const found = users.find(u => u.name === last);
        if(found) currentUser = { id: found.id, name: found.name };
    }

    function persistCurrentUser() {
        if(currentUser) localStorage.setItem("lastUser", currentUser.name);
        else localStorage.removeItem("lastUser");
    }

    // ڕاپێچکردنی updateUI دوای گۆڕانکاری
    const origUpdate = updateUI;
    updateUI = function() {
        origUpdate();
        persistCurrentUser();
    };

    loadData();
    if(!currentUser && users.length) currentUser = { id: users[0].id, name: users[0].name };
    updateUI();
    updateCountdown();
    setInterval(updateCountdown, 3600000);
</script>
</body>
</html>
