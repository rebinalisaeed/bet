<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وشەی نهێنی لەبیرچوو - Kurdliga</title>

  
  <link rel="stylesheet" href="css/forgot-password.css">
</head>

<body>

  <div class="forgot-box">

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <h1 class="title">وشەی نهێنیت لەبیرکردووە؟</h1>

    <p class="desc">
      ئیمەیڵی هەژمارەکەت بنووسە، لینکی گەڕاندنەوەی وشەی نهێنی بۆت دەنێردرێت.
    </p>

    <form onsubmit="resetPassword(event)">

      <div class="field-wrap" id="wrap-email">
        <div class="input-box" id="emailBox">
          <span class="right-icon">✉️</span>
          <input type="email" id="email" placeholder="ئیمەیڵ" />
        </div>
        <div class="error-text" id="emailError"></div>
      </div>

      <button type="submit" class="send-btn" id="sendBtn">
        ناردنی لینکی گەڕاندنەوە
      </button>

      <a href="login.html" class="back-link">گەڕانەوە بۆ چوونەژوورەوە</a>

    </form>

  </div>

  <div class="modal" id="successModal">
    <div class="modal-box">
      <h2>سەرکەوتوو بوو</h2>
      <p>
        لینکی گەڕاندنەوەی وشەی نهێنی بۆ ئیمەیڵەکەت نێردرا.
      </p>
    </div>
  </div>

  <script type="module" src="js/forgot-password-1.js"></script>

</body>
</html>
