<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>وشەی نهێنی لەبیرچوو - Kurdliga</title>

  <style>
    @font-face {
      font-family: 'Kurdliga-Regular';
      src: url('fonts/kurdliga-Reg.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Kurdliga-Bold';
      src: url('fonts/kurdliga-bold.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #021133;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    body {
      min-height: 100vh;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 25px;
      overflow-x: hidden;
    }

    .forgot-box {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .logo {
      width: min(75%, 300px);
      display: block;
      margin: 0 auto 35px;
    }

    .title {
      font-size: 27px;
      margin-bottom: 12px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .desc {
      font-size: 16px;
      line-height: 1.9;
      color: #BFC8D4;
      margin-bottom: 28px;
    }

    .field-wrap {
      margin-bottom: 18px;
    }

    .input-box {
      width: 100%;
      height: 62px;
      border: 2px solid #F5F7FA;
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      background: transparent;
      transition: 0.2s ease;
    }

    .input-box.error {
      border-color: #ff4d4d;
      box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.15);
    }

    .right-icon {
      font-size: 23px;
      color: #F5F7FA;
      margin-left: 12px;
      line-height: 1;
    }

    input {
      flex: 1;
      min-width: 0;
      background: transparent !important;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 18px;
      text-align: right;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    input::placeholder {
      color: #BFC8D4;
    }

    input:focus {
      outline: none;
      box-shadow: none;
      background: transparent !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #ffffff;
      -webkit-box-shadow: 0 0 0px 1000px #021133 inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    .error-text {
      display: none;
      color: #ff4d4d;
      text-align: right;
      font-size: 14px;
      margin: 8px 8px 0;
      font-family: 'Kurdliga-Bold', sans-serif;
      line-height: 1.7;
    }

    .field-wrap.show-error .error-text {
      display: block;
    }

    .send-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #00C853;
      color: #ffffff;
      font-size: 22px;
      font-family: 'Kurdliga-Bold', sans-serif;
      cursor: pointer;
      margin-bottom: 18px;
    }

    .send-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .back-link {
      display: inline-block;
      color: #00C853;
      font-size: 18px;
      text-decoration: none;
      font-family: 'Kurdliga-Bold', sans-serif;
      margin-top: 6px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      color: #021133;
      border-radius: 22px;
      padding: 28px 22px;
      text-align: center;
    }

    .modal-box h2 {
      color: #00C853;
      font-size: 25px;
      margin-bottom: 10px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .modal-box p {
      font-size: 16px;
      line-height: 1.9;
    }
  

    /* =========================================================
       Kurdliga mobile browser normalization
       Keeps Chrome / Brave / Samsung Internet / Safari layout
       visually consistent with the Brave mobile design.
       ========================================================= */
    :root {
      --app-max-width: 560px;
      --app-header-height: 76px;
      --app-bottom-nav-height: 74px;
      --app-side-padding: 14px;
    }

    html {
      width: 100%;
      min-width: 320px;
      background: #021133;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-width: 320px;
      min-height: 100svh;
      min-height: 100dvh;
      background: #021133;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: none;
    }

    body.no-scroll {
      height: 100svh;
      height: 100dvh;
    }

    img, svg, video, canvas {
      max-width: 100%;
      height: auto;
    }

    button, input, select, textarea {
      font: inherit;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .splash,
    .login-box,
    .register-box,
    .forgot-box {
      width: 100%;
      max-width: min(430px, calc(100vw - 44px));
      margin-inline: auto;
    }

    .header {
      height: var(--app-header-height);
      min-height: var(--app-header-height);
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      box-sizing: border-box;
    }

    body:has(.header) {
      padding-top: calc(var(--app-header-height) + env(safe-area-inset-top, 0px));
    }

    .logo {
      width: clamp(118px, 34vw, 145px);
      flex: 0 0 auto;
    }

    .wallet-mini {
      min-width: clamp(86px, 22vw, 104px);
      flex: 0 0 auto;
    }

    .coin-line,
    .diamond-line {
      font-size: clamp(15px, 4.2vw, 16px);
    }

    .menu-btn,
    .notify-btn,
    .live-filter-btn,
    .back-btn {
      width: clamp(40px, 11vw, 42px);
      height: clamp(40px, 11vw, 42px);
      flex: 0 0 auto;
    }

    .page,
    .slide-content {
      width: 100%;
      max-width: min(var(--app-max-width), calc(100vw - 28px));
      margin-inline: auto;
    }

    .page {
      padding-inline: var(--app-side-padding);
    }

    .ad-slider,
    .slide {
      min-height: clamp(145px, 26svh, 235px);
    }

    .date-banner,
    .date-item {
      height: clamp(70px, 12svh, 76px);
    }

    .date-title {
      font-size: clamp(16px, 4.4vw, 17px);
    }

    .date-sub {
      font-size: clamp(10px, 3vw, 11px);
    }

    .competition-card,
    .match-card,
    .archive-card,
    .search-box {
      width: 100%;
      max-width: 100%;
    }

    .competition-title {
      font-size: clamp(19px, 5.3vw, 22px);
    }

    .match-time-top,
    .match-time-row {
      font-size: clamp(24px, 7.2vw, 30px);
    }

    .match-time-row.live-time {
      font-size: clamp(30px, 8.6vw, 34px);
    }

    .team-side .team-name-inline,
    .team-name {
      font-size: clamp(16px, 4.5vw, 17px);
    }

    .points-row {
      gap: clamp(8px, 2.2vw, 10px);
    }

    .point-box {
      min-height: clamp(64px, 16vw, 78px);
      padding-inline: 6px;
    }

    .point-title {
      font-size: clamp(11px, 3.2vw, 12px);
    }

    .point-value {
      font-size: clamp(16px, 4.6vw, 18px);
    }

    .bottom-nav {
      height: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    body:has(.bottom-nav) {
      padding-bottom: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 14px);
    }

    .bet-slip-toggle {
      bottom: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 10px);
    }

    .bet-slip-panel {
      bottom: calc(var(--app-bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 10px);
      max-height: calc(100dvh - var(--app-header-height) - var(--app-bottom-nav-height) - 30px);
    }

    .side-overlay,
    .side-menu {
      top: calc(var(--app-header-height) + env(safe-area-inset-top, 0px));
    }

    @media (max-width: 380px) {
      :root { --app-side-padding: 10px; }
      .header { padding-inline: 10px; }
      .logo { width: clamp(108px, 31vw, 132px); }
      .wallet-mini { min-width: 78px; }
      .header-left { gap: 6px; }
      .coin-line, .diamond-line { font-size: 14px; }
      .point-title { font-size: 10.5px; }
      .nav-item { font-size: 10.5px; }
      .nav-icon { font-size: 21px; }
    }

    @media (min-width: 700px) and (pointer: coarse) {
      :root { --app-max-width: 560px; }
      .page, .slide-content { max-width: 560px; }
    }

  </style>


  <script>
    // Normalize viewport units on mobile browsers whose address bars resize the page.
    (function () {
      function setKurdligaViewport() {
        document.documentElement.style.setProperty('--real-vh', (window.innerHeight * 0.01) + 'px');
      }
      setKurdligaViewport();
      window.addEventListener('resize', setKurdligaViewport, { passive: true });
      window.addEventListener('orientationchange', setKurdligaViewport, { passive: true });
    })();
  </script>

</head>

<body>

  <div class="forgot-box">

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <h1 class="title">وشەی نهێنیت لەبیرکردووە؟</h1>

    <p class="desc">
      ئیمەیڵی هەژمارەکەت بنووسە، لینکی گەڕاندنەوەی وشەی نهێنی بۆت دەنێردرێت.
    </p>

    <form onsubmit="resetPassword(event)">

      <div class="field-wrap" id="wrap-email">
        <div class="input-box" id="emailBox">
          <span class="right-icon">✉️</span>
          <input type="email" id="email" placeholder="ئیمەیڵ" />
        </div>
        <div class="error-text" id="emailError"></div>
      </div>

      <button type="submit" class="send-btn" id="sendBtn">
        ناردنی لینکی گەڕاندنەوە
      </button>

      <a href="login.html" class="back-link">گەڕانەوە بۆ چوونەژوورەوە</a>

    </form>

  </div>

  <div class="modal" id="successModal">
    <div class="modal-box">
      <h2>سەرکەوتوو بوو</h2>
      <p>
        لینکی گەڕاندنەوەی وشەی نهێنی بۆ ئیمەیڵەکەت نێردرا.
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2ENjViKDRHwwBUGTjrDJMrnrQePGhDqY",
      authDomain: "kurdliga1.firebaseapp.com",
      databaseURL: "https://kurdliga1-default-rtdb.firebaseio.com",
      projectId: "kurdliga1",
      storageBucket: "kurdliga1.firebasestorage.app",
      messagingSenderId: "799164130957",
      appId: "1:799164130957:web:a3ff5ec1ccb026ca59a4c4",
      measurementId: "G-8TCVRT6GNK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showError(message) {
      const wrap = document.getElementById("wrap-email");
      const box = document.getElementById("emailBox");
      const error = document.getElementById("emailError");

      wrap.classList.add("show-error");
      box.classList.add("error");
      error.textContent = message;
    }

    function clearError() {
      const wrap = document.getElementById("wrap-email");
      const box = document.getElementById("emailBox");
      const error = document.getElementById("emailError");

      wrap.classList.remove("show-error");
      box.classList.remove("error");
      error.textContent = "";
    }

    document.getElementById("email").addEventListener("input", clearError);

    window.resetPassword = async function(event) {
      event.preventDefault();
      clearError();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const sendBtn = document.getElementById("sendBtn");

      if (!email) {
        showError("تکایە ئیمەیڵ بنووسە");
        return;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if (!emailPattern.test(email)) {
  showError("ئیمەیڵەکە دروست نییە");
  return;
}

      try {
        sendBtn.disabled = true;
        sendBtn.textContent = "تکایە چاوەڕێ بکە...";

        await sendPasswordResetEmail(auth, email);

        document.getElementById("successModal").classList.add("show");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2500);

      } catch (error) {
        if (error.code === "auth/user-not-found") {
          showError("هیچ هەژمارێک بەم ئیمەیڵە نەدۆزرایەوە");
        } else if (error.code === "auth/invalid-email") {
          showError("ئیمەیڵەکە دروست نییە");
        } else {
          showError("هەڵەیەک ڕوویدا، تکایە دووبارە هەوڵ بدەوە");
        }
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "ناردنی لینکی گەڕاندنەوە";
      }
    };
  </script>

</body>
</html>
