<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وشەی نهێنی لەبیرچوو - Kurdliga</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="forgot-password" class="auth-page">
  <main class="auth-container">
    <section class="auth-card">
      <img src="assets/images/logo.png" alt="Kurdliga Logo" class="auth-logo" />
      <h1 class="auth-title">وشەی نهێنیت لەبیرکردووە؟</h1>
      <p class="auth-subtitle">ئیمەیڵی هەژمارەکەت بنووسە، لینکی گەڕاندنەوەی وشەی نهێنی بۆت دەنێردرێت.</p>

      <form class="auth-form" onsubmit="resetPassword(event)">
        <div id="wrap-email">
          <input type="email" id="email" class="auth-input" placeholder="ئیمەیڵ" />
          <div class="error-text" id="emailError"></div>
        </div>

        <button type="submit" class="auth-btn" id="sendBtn">ناردنی لینکی گەڕاندنەوە</button>
        <a href="login.html" class="auth-link" style="text-align:center;">گەڕانەوە بۆ چوونەژوورەوە</a>
      </form>
    </section>
  </main>

  <div class="modal" id="successModal">
    <div class="modal-box">
      <h2>سەرکەوتوو بوو</h2>
      <p>لینکی گەڕاندنەوەی وشەی نهێنی بۆ ئیمەڵەکەت نێردرا.</p>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
