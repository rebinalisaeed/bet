<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ئاڵوگۆڕکردن - Kurdliga</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="exchange">
  <div class="side-overlay" id="sideOverlay" onclick="closeSideMenu()"></div>

  <aside class="side-menu" id="sideMenu">
    <button class="menu-item" disabled>👤 پرۆفایل</button>
    <button class="menu-item" disabled>🏆 خولەکانی تۆپی پێی</button>
    <button class="menu-item" disabled>⚙️ ڕێکخستن</button>
    <button class="menu-item" disabled>🌐 زمان</button>
    <button class="menu-item" disabled>📜 مەرج و ڕێسا</button>
    <button class="menu-item" disabled>❓ یارمەتی</button>
    <button class="menu-item logout-active" onclick="logoutUser()">🚪 چوونەدەرەوە</button>
  </aside>
  <header class="header">
    <div class="header-left">
      <button class="menu-btn" id="menuBtn" onclick="toggleSideMenu()">
        <span></span><span></span><span></span>
      </button>
      <a href="notifications.html" class="notify-btn">🔔</a>
    </div>

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" id="headerLogo" />

    <div class="wallet-mini">
      <div class="coin-line">🪙 <span id="coinsText">0</span></div>
      <div class="wallet-divider"></div>
      <div class="diamond-line">💎 <span id="diamondsText">0</span></div>
    </div>
  </header>

  <main class="page">
    <section class="page-hero">
      <h1>ئاڵوگۆڕکردن</h1>
      <p>لێرە دەتوانیت کۆین و ئەڵماس ئاڵوگۆڕ بکەیت. ئەمە وەشانی تاقیکردنەوەیە.</p>
    </section>

    <section class="exchange-card">
      <div class="section-title">🔄 ئاڵوگۆڕی کۆین بۆ ئەڵماس</div>
      <input class="form-input" id="coinAmount" type="number" placeholder="بڕی کۆین بنووسە" oninput="calcExchange()">
      <div class="exchange-rate-box">
        <div>١٠٠ کۆین = ١ ئەڵماس</div>
        <b id="diamondResult">💎 0</b>
      </div>
      <button class="primary-btn" onclick="alert('ئەم دوگمەیە تەنها بۆ تاقیکردنەوەیە')">جێبەجێکردن</button>
    </section>

    <section class="exchange-grid" style="margin-top:14px;">
      <div class="exchange-card">
        <div class="exchange-title">١٠٠٠ کۆین</div>
        <div class="exchange-text">دەگۆڕدرێت بۆ ١٠ ئەڵماس</div>
      </div>
      <div class="exchange-card">
        <div class="exchange-title">٥٠٠٠ کۆین</div>
        <div class="exchange-text">دەگۆڕدرێت بۆ ٥٠ ئەڵماس</div>
      </div>
    </section>
  </main>

  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <a href="my-predictions.html" class="nav-item" aria-label="پێشبینیەکانم">
        <span class="nav-icon">🧾</span>
        <span class="nav-text">پێشبینیەکانم</span>
      </a>

      <a href="exchange.html" class="nav-item active" aria-label="ئاڵوگۆڕکردن">
        <span class="nav-icon">🔄</span>
        <span class="nav-text">ئاڵوگۆڕکردن</span>
      </a>

      <a href="home.html" class="nav-item home-nav" aria-label="سەرەتا">
        <span class="home-nav-circle">
          <img src="assets/images/armlogo.png" alt="سەرەتا" class="home-nav-logo" />
        </span>
        <span class="home-nav-text">سەرەتا</span>
      </a>

      <a href="market.html" class="nav-item" aria-label="بازار">
        <span class="nav-icon">🛒</span>
        <span class="nav-text">بازار</span>
      </a>

      <a href="leaderboard.html" class="nav-item" aria-label="ڕێزبەندی">
        <span class="nav-icon">🏆</span>
        <span class="nav-text">ڕێزبەندی</span>
      </a>
    </nav>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
