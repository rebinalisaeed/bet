<!doctype html><html lang="ku" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>پێشبینی</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#07131F] text-white min-h-screen"><main class="max-w-md mx-auto p-4"><a href="matches.html" class="text-[#00C853]">← گەڕانەوە</a><section class="mt-6 bg-[#102030] rounded-[2rem] p-5 border border-white/10"><h1 class="text-2xl font-black mb-5 text-center">پێشبینی یاری</h1><div class="grid grid-cols-3 gap-3 text-center"><button data-p="home" class="pick bg-[#00C853] p-4 rounded-2xl font-bold">بردنی یەکەم</button><button data-p="draw" class="pick bg-[#07131F] p-4 rounded-2xl">یەکسان</button><button data-p="away" class="pick bg-[#07131F] p-4 rounded-2xl">بردنی دووەم</button></div><label class="block mt-6 mb-2 text-gray-300">پۆینت</label><select id="points" class="w-full p-4 rounded-2xl bg-[#07131F]"><option>25</option><option>50</option><option selected>100</option><option>250</option><option>500</option></select><button id="submitBtn" class="w-full mt-6 p-4 rounded-2xl bg-[#00C853] font-bold">ناردنی پێشبینی</button></section></main><script type="module">import{protect,submitPrediction}from'./assets/js/app.js';protect();let selected='home';document.querySelectorAll('.pick').forEach(b=>b.onclick=()=>{selected=b.dataset.p;document.querySelectorAll('.pick').forEach(x=>x.classList.remove('bg-[#00C853]'));b.classList.add('bg-[#00C853]')});const id=new URLSearchParams(location.search).get('id')||'test_match';submitBtn.onclick=()=>submitPrediction(id,selected,points.value);</script></body></html>
