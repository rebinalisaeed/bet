<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پێشبینیەکانم - Kurdliga</title>

  <style>
    @font-face { font-family: 'Kurdliga-Regular'; src: url('fonts/kurdliga-Reg.ttf') format('truetype'); }
    @font-face { font-family: 'Kurdliga-Bold'; src: url('fonts/kurdliga-bold.ttf') format('truetype'); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #021133;
      color: #fff;
      font-family: 'Kurdliga-Regular', sans-serif;
      padding-top: 76px;
      padding-bottom: 112px;
      overflow-x: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 76px;
      background: linear-gradient(145deg, #061a48, #021133);
      border-bottom: 1px solid rgba(245,247,250,.16);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 3000;
      box-shadow: 0 10px 25px rgba(0,0,0,.28);
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .logo { width: 145px; }

    .wallet-mini {
      min-width: 92px;
      text-align: left;
      line-height: 1.4;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .coin-line,
    .diamond-line {
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      direction: ltr;
    }

    .coin-line span,
    .diamond-line span { color: #00C853; }

    .wallet-divider {
      height: 1px;
      background: rgba(180,180,180,.45);
      margin: 4px 0;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 18px 14px;
    }

    .search-box {
      background: #061a48;
      border: 1px solid rgba(245,247,250,.14);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .search-title {
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 21px;
      color: #00C853;
      text-align: center;
      margin-bottom: 14px;
    }

    .field-label {
      color: #BFC8D4;
      font-size: 14px;
      margin: 12px 4px 8px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .filter-input {
      width: 100%;
      height: 52px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: #fff;
      border-radius: 16px;
      padding: 0 14px;
      outline: none;
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 16px;
      text-align: center;
    }

    .range-display {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: #BFC8D4;
      border-radius: 16px;
      padding: 14px;
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }

    .get-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 16px;
      background: #00C853;
      color: #fff;
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 18px;
      margin-top: 14px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,200,83,.22);
    }

    .hint-text {
      color: #7A869A;
      text-align: center;
      font-size: 12px;
      line-height: 1.8;
      margin-top: 10px;
    }

    .archive-card {
      background: #061a48;
      border: 1px solid rgba(245,247,250,.14);
      border-radius: 22px;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      overflow: hidden;
    }

    .archive-summary {
      padding: 16px;
      cursor: pointer;
    }

    .archive-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-family: 'Kurdliga-Bold', sans-serif;
      background: rgba(255,215,0,.16);
      color: #FFD700;
      white-space: nowrap;
    }

    .status.win {
      background: rgba(0,200,83,.16);
      color: #00C853;
    }

    .status.lost {
      background: rgba(255,59,59,.16);
      color: #ff4d4d;
    }

    .date-text {
      color: #BFC8D4;
      font-size: 12px;
    }

    .summary-title {
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 16px;
      line-height: 1.8;
    }

    .summary-sub {
      color: #BFC8D4;
      font-size: 13px;
      line-height: 1.7;
    }

    .archive-content {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid rgba(255,255,255,.10);
    }

    .archive-card.open .archive-content {
      display: block;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0 12px;
    }

    .info-box {
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 10px 6px;
      text-align: center;
    }

    .info-box span {
      display: block;
      color: #BFC8D4;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .info-box b {
      color: #00C853;
      font-size: 15px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .match-item {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 12px;
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .match-name {
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 14px;
      line-height: 1.7;
    }

    .pick-line {
      color: #BFC8D4;
      font-size: 13px;
      margin-top: 4px;
    }

    .pick-line b { color: #00C853; }

    .game-status {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-family: 'Kurdliga-Bold', sans-serif;
      background: rgba(255,215,0,.16);
      color: #FFD700;
      white-space: nowrap;
    }

    .game-status.win {
      background: rgba(0,200,83,.16);
      color: #00C853;
    }

    .game-status.lost {
      background: rgba(255,59,59,.16);
      color: #ff4d4d;
    }

    .empty-box {
      background: rgba(255,255,255,.06);
      border: 1px dashed rgba(255,255,255,.20);
      border-radius: 22px;
      padding: 34px 16px;
      text-align: center;
      color: #BFC8D4;
      line-height: 1.8;
      margin-top: 20px;
    }

    .bottom-nav-wrap {
      position: fixed;
      right: 0;
      left: 0;
      bottom: 0;
      height: 98px;
      z-index: 3000;
      pointer-events: none;
    }

    .bottom-nav {
      position: absolute;
      right: 0;
      left: 0;
      bottom: 0;
      height: 78px;
      background: rgba(6,26,72,.98);
      border-top: 1px solid rgba(245,247,250,.16);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      z-index: 2;
      backdrop-filter: blur(16px);
      box-shadow: 0 -12px 28px rgba(0,0,0,.34);
      border-radius: 26px 26px 0 0;
      overflow: visible;
      pointer-events: auto;
    }

    .bottom-nav::before,
    .bottom-nav::after {
      display: none !important;
      content: none !important;
    }

    .nav-item {
      position: relative;
      z-index: 3;
      color: #BFC8D4;
      text-decoration: none;
      text-align: center;
      font-size: 10px;
      line-height: 1.25;
      min-width: 0;
      width: 100%;
      height: 78px;
      padding: 7px 0 5px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      transition: .16s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
    }

    .nav-item::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
    }

    .nav-item span,
    .nav-item img {
      pointer-events: none;
    }

    .nav-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 2px;
      opacity: .9;
    }

    .nav-item.active {
      color: #00C853;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .nav-item:not(.home-tab).active .nav-icon {
      transform: translateY(-2px) scale(1.08);
    }

    .home-tab {
      width: 100%;
      height: 98px;
      transform: translateY(-24px);
      color: #ffffff;
      font-family: 'Kurdliga-Bold', sans-serif;
      z-index: 4;
      padding-top: 0;
    }

    .home-tab .home-circle {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00C853, #00a846);
      border: 6px solid #021133;
      box-shadow: 0 10px 25px rgba(0,0,0,.36), 0 0 0 1px rgba(0,200,83,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 3px;
      overflow: hidden;
    }

    .home-logo-icon {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 0 rgba(0,0,0,.12));
    }

    .home-tab span:last-child {
      font-size: 11px;
      color: #ffffff;
      margin-top: -1px;
      display: block;
    }

    .nav-item:active {
      transform: scale(.96);
    }

    .home-tab:active {
      transform: translateY(-24px) scale(.96);
    }

    @media (max-width: 360px) {
      .nav-item { font-size: 9px; }
      .nav-icon { font-size: 20px; }
      .home-tab .home-circle { width: 62px; height: 62px; }
      .home-logo-icon { width: 31px; height: 31px; }
    }


  </style>
</head>

<body>

  <header class="header">
    <a href="home.html" class="back-btn">‹</a>

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <div class="wallet-mini">
      <div class="coin-line">🪙 <span id="coinsText">0</span></div>
      <div class="wallet-divider"></div>
      <div class="diamond-line">💎 <span id="diamondsText">0</span></div>
    </div>
  </header>

  <main class="page">

    <section class="search-box">
      <div class="search-title">گەڕانی پسولەکان</div>

      <div class="field-label">ژمارەی پسولە</div>
      <input
        type="text"
        id="betNoInput"
        class="filter-input"
        placeholder="# ژمارەی پسولە"
      />

      <div class="field-label">ماوەی گەڕان</div>
      <div class="range-display" id="rangeDisplay"></div>

      <button class="get-btn" onclick="applyFilters()">گەڕان</button>

      <div class="hint-text">
        تەنها پسولەکانی ئەمڕۆ و دوێنێ نیشان دەدرێن بۆ کەمکردنەوەی ترافیک.
      </div>
    </section>

    <div id="archiveList">
      <div class="empty-box">چاوەڕێ بکە...</div>
    </div>

  </main>
  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <a href="my-predictions.html" class="nav-item active" aria-label="پێشبینیەکانم">
        <span class="nav-icon">🧾</span>
        <span>پێشبینیەکانم</span>
      </a>

      <a href="exchange.html" class="nav-item" aria-label="ئاڵوگۆڕکردن">
        <span class="nav-icon">🔄</span>
        <span>ئاڵوگۆڕکردن</span>
      </a>

      <a href="home.html" class="nav-item home-tab" aria-label="سەرەتا">
        <span class="home-circle"><img src="assets/images/armlogo.png" alt="K" class="home-logo-icon"></span>
        <span>سەرەتا</span>
      </a>

      <a href="market.html" class="nav-item" aria-label="بازار">
        <span class="nav-icon">🛒</span>
        <span>بازار</span>
      </a>

      <a href="leaderboard.html" class="nav-item" aria-label="ڕێزبەندی">
        <span class="nav-icon">🏆</span>
        <span>ڕێزبەندی</span>
      </a>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      query,
      orderBy,
      where,
      getDocs,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2ENjViKDRHwwBUGTjrDJMrnrQePGhDqY",
      authDomain: "kurdliga1.firebaseapp.com",
      databaseURL: "https://kurdliga1-default-rtdb.firebaseio.com",
      projectId: "kurdliga1",
      storageBucket: "kurdliga1.firebasestorage.app",
      messagingSenderId: "799164130957",
      appId: "1:799164130957:web:a3ff5ec1ccb026ca59a4c4",
      measurementId: "G-8TCVRT6GNK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let allArchives = [];

    function formatPoint(value) {
      if (value === undefined || value === null || value === "") return "0.00";
      return Number(value).toFixed(2);
    }

    function formatDate(timestamp) {
      if (!timestamp || !timestamp.toDate) return "بەروار نەزانراوە";

      const date = timestamp.toDate();

      return new Intl.DateTimeFormat("ku-IQ", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function formatDateInput(date) {
      const d = String(date.getDate()).padStart(2, "0");
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }

    function getTwoDayRange() {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      start.setDate(start.getDate() - 1);

      const end = new Date();
      end.setHours(23, 59, 59, 999);

      return {
        startDate: start,
        endDate: end,
        start: Timestamp.fromDate(start),
        end: Timestamp.fromDate(end)
      };
    }

    function setRangeDisplay() {
      const range = getTwoDayRange();
      document.getElementById("rangeDisplay").textContent =
        `${formatDateInput(range.startDate)} 00:00 - ${formatDateInput(range.endDate)} 23:59`;
    }

    function getGameStatus(item) {
      if (item.gameStatus === "win" || item.status === "win" || item.isWin === true) return "win";
      if (item.gameStatus === "lost" || item.status === "lost" || item.isWin === false) return "lost";
      return "pending";
    }

    function getGameStatusText(status) {
      if (status === "win") return "براوە";
      if (status === "lost") return "دۆڕاو";
      return "چاوەڕێ";
    }

    function getSlipStatus(items) {
      if (!items || items.length === 0) return "pending";

      const statuses = items.map(getGameStatus);

      if (statuses.includes("pending")) return "pending";
      if (statuses.every(s => s === "win")) return "win";

      return "lost";
    }

    function getSlipStatusText(status) {
      if (status === "win") return "باری پسولە: براوە";
      if (status === "lost") return "باری پسولە: سوتاوە";
      return "باری پسولە: چاوەڕێ";
    }

    function getStatusClass(status) {
      if (status === "win") return "win";
      if (status === "lost") return "lost";
      return "";
    }

    window.toggleCard = function(id) {
      document.getElementById(id).classList.toggle("open");
    };

    window.applyFilters = function() {
      const betNo = document.getElementById("betNoInput").value.trim().replace("#", "").toLowerCase();

      let filtered = allArchives;

      if (betNo) {
        filtered = filtered.filter(item =>
          String(item.betNo || item.id || "").toLowerCase().includes(betNo)
        );
      }

      renderArchive(filtered);
    };

    async function loadUserInfo(user) {
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) return;

      const data = userSnap.data();

      document.getElementById("coinsText").textContent = data.coins || 0;
      document.getElementById("diamondsText").textContent = data.diamonds || 0;
    }

    async function loadArchive(user) {
      const archiveList = document.getElementById("archiveList");
      archiveList.innerHTML = `<div class="empty-box">چاوەڕێ بکە...</div>`;

      try {
        const range = getTwoDayRange();

        const archiveRef = collection(db, "users", user.uid, "predictionArchive");

        const q = query(
          archiveRef,
          where("createdAt", ">=", range.start),
          where("createdAt", "<=", range.end),
          orderBy("createdAt", "desc")
        );

        const snap = await getDocs(q);

        allArchives = [];

        snap.forEach(docSnap => {
          allArchives.push({
            id: docSnap.id,
            ...docSnap.data()
          });
        });

        renderArchive(allArchives);

      } catch (error) {
        archiveList.innerHTML = `
          <div class="empty-box">
            هەڵە ڕوویدا: ${error.code || ""}<br>
            ${error.message || ""}
          </div>
        `;
      }
    }

    function renderArchive(list) {
      const archiveList = document.getElementById("archiveList");

      if (!list || list.length === 0) {
        archiveList.innerHTML = `
          <div class="empty-box">
            هیچ پسولەیەک لەم ماوەیەدا نەدۆزرایەوە.
          </div>
        `;
        return;
      }

      archiveList.innerHTML = "";

      list.forEach((data, index) => {
        const items = data.items || [];
        const slipStatus = getSlipStatus(items);
        const cardId = "archiveCard_" + data.id;
        const betNo = data.betNo || data.id.slice(0, 8);

        const matchesHtml = items.map(item => {
          const gameStatus = getGameStatus(item);

          return `
            <div class="match-item">
              <div>
                <div class="match-name">${item.matchName || ""}</div>
                <div class="pick-line">
                  ${item.pickTitle || ""} | پۆینت: <b>${formatPoint(item.point)}</b>
                </div>
              </div>

              <span class="game-status ${getStatusClass(gameStatus)}">
                ${getGameStatusText(gameStatus)}
              </span>
            </div>
          `;
        }).join("");

        archiveList.innerHTML += `
          <div class="archive-card" id="${cardId}">
            <div class="archive-summary" onclick="toggleCard('${cardId}')">
              <div class="archive-top">
                <span class="status ${getStatusClass(slipStatus)}">${getSlipStatusText(slipStatus)}</span>
                <span class="date-text">${formatDate(data.createdAt)}</span>
              </div>

              <div class="summary-title">پسولە #${betNo}</div>
              <div class="summary-sub">
                ${items.length} یاری | کۆین: ${data.stake || 0} | تۆتال: ${formatPoint(data.totalPoint)}
              </div>
            </div>

            <div class="archive-content">
              <div class="info-grid">
                <div class="info-box">
                  <span>کۆین</span>
                  <b>${data.stake || 0}</b>
                </div>

                <div class="info-box">
                  <span>تۆتال پۆینت</span>
                  <b>${formatPoint(data.totalPoint)}</b>
                </div>

                <div class="info-box">
                  <span>بردنەوەی پێشبینی</span>
                  <b>${data.possibleWin || 0}</b>
                </div>
              </div>

              ${matchesHtml}
            </div>
          </div>
        `;
      });
    }

    setRangeDisplay();

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      await loadUserInfo(user);
      await loadArchive(user);
    });
  </script>

</body>
</html>
