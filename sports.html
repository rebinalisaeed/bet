<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>وەرزشەکان - پێشبڕکێی گەل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kurdliga Regular', 'Segoe UI', system-ui, sans-serif;
            background: #0f1119;
            color: #eef2ff;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .sports-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 12px;
            height: calc(100vh - 130px);
            overflow-y: auto;
        }

        /* نێویگەیشنی سەرەوە - ناوەڕاستکراو */
        .sports-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #1a1e2c;
            padding: 12px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
        }

        .sports-tabs::-webkit-scrollbar {
            height: 3px;
        }

        .sports-tab {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: #aaa;
            font-family: 'Kurdliga Regular', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .sports-tab.active {
            background: #f5b042;
            color: #0a0c12;
            font-family: 'Kurdliga Bold', sans-serif;
        }

        .fixed-buttons {
            display: flex;
            gap: 12px;
            margin-left: auto;
            margin-right: 10px;
        }

        .icon-btn {
            background: #2e3a4e;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: #f5b042;
            transform: scale(0.95);
        }

        /* لیستی وەرزشەکان - بە شێوازی سادە (بێ بۆکس) */
        .sports-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            padding: 15px 0;
            background: transparent;
            justify-content: center;
        }

        .sport-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            color: #ccc;
        }

        .sport-item.active {
            color: #f5b042;
            background: #f5b04220;
        }

        .sport-item:hover {
            color: #FFD966;
            transform: translateY(-2px);
        }

        .sport-icon {
            font-size: 1.2rem;
        }

        .sport-name {
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* فیلتەری کات - بە شێوازی سادە */
        .time-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px 0;
            background: transparent;
        }

        .time-filter {
            background: #1e2335;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .time-filter.active {
            background: #f5b042;
            color: #0a0c12;
            font-family: 'Kurdliga Bold', sans-serif;
        }

        /* سلایدەر - 2 هێندە بەرزتر و پانایی تەواو */
        .matches-slider-container {
            position: relative;
            width: 100vw;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            height: 360px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1e2c, #0f1220);
            border-top: 2px solid #f5b04230;
            border-bottom: 2px solid #f5b04230;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .matches-slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .match-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .match-slide.active {
            opacity: 1;
            visibility: visible;
        }

        .match-card-slider {
            background: #0f1119cc;
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 25px 30px;
            text-align: center;
            width: 80%;
            max-width: 500px;
            border: 1px solid #f5b04240;
        }

        .match-teams-slider {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .match-odds-slider {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 15px 0;
        }

        .match-odds-slider span {
            background: #1f2538;
            padding: 6px 15px;
            border-radius: 25px;
            color: #FFD966;
            font-weight: bold;
        }

        .match-bet-btn {
            background: #f5b042;
            border: none;
            padding: 8px 25px;
            border-radius: 35px;
            font-weight: bold;
            color: #0a0c12;
            cursor: pointer;
            margin: 5px;
        }

        .match-slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .match-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .match-dot.active {
            background: #f5b042;
            width: 22px;
            border-radius: 10px;
        }

        /* لیستی یارییەکان */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .match-item {
            background: #1a1e2c;
            border-radius: 20px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #2a2d3a;
        }

        .match-info {
            flex: 1;
        }

        .match-teams {
            font-weight: bold;
            font-size: 1rem;
        }

        .match-time {
            font-size: 0.7rem;
            color: #aaa;
        }

        .match-points {
            background: #1f2538;
            padding: 5px 15px;
            border-radius: 20px;
            color: #FFD966;
            font-weight: bold;
        }

        .predict-btn {
            background: #2e3a4e;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 550px) {
            .sports-tab {
                padding: 6px 14px;
                font-size: 0.85rem;
            }
            .icon-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .sport-name {
                font-size: 0.7rem;
            }
            .time-filter {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
            .matches-slider-container {
                height: 300px;
            }
            .match-teams-slider {
                font-size: 0.9rem;
                gap: 10px;
            }
            .match-card-slider {
                padding: 15px 20px;
                width: 90%;
            }
        }
    </style>
</head>

<script>
    const sports = [
        { name: "تۆپی پێ", icon: "⚽", id: "football" },
        { name: "تێنس", icon: "🎾", id: "tennis" },

        { name: "تۆپی دەست", icon: "🤾", id: "handball" },
        { name: "فوتساڵ", icon: "⚽", id: "futsal" },
        { name: "بەیسباڵ", icon: "⚾", id: "baseball" },
        { name: "تۆپی پێی ئەمەریکی", icon: "🏈", id: "americanfootball" },
        { name: "تۆپی ئەوستراڵی", icon: "🏉", id: "australianfootball" },
        { name: "ڕیشە", icon: "🏑", id: "fieldhockey" },
        { name: "تۆپی پێی زیخ", icon: "⛸️", id: "icesoccer" },
        { name: "سنووکەر", icon: "🎱", id: "snooker" },
        { name: "تیری دەست", icon: "🎯", id: "darts" },
        { name: "کریکێت", icon: "🏏", id: "cricket" },
        { name: "فلۆرباڵ", icon: "🏑", id: "floorball" },
        { name: "ڕاگبی یۆنیۆن", icon: "🏉", id: "rugby" },
        { name: "ڕاگبی لیگ", icon: "🏉", id: "rugbyleague" },
        { name: "فۆرمۆلا وەن", icon: "🏎️", id: "f1" },
        { name: "ناس کار", icon: "🏎️", id: "nascar" },
        { name: "مۆتۆر سواری", icon: "🏍️", id: "moto" },
        { name: "پێشبڕکێی ئۆتۆمبێل", icon: "🏎️", id: "racing" },
        { name: "مۆتۆڕی سپیداوی", icon: "🏍️", id: "speedway" },
        { name: "Indy car", icon: "🏎️", id: "indycar" },
        { name: "پایسکیل سواری", icon: "🚲", id: "cycling" },
        { name: "شەترەنج", icon: "♟️", id: "chess" },
        { name: "بلیارد", icon: "🎱", id: "billiards" },
        { name: "یاریەکانی تر", icon: "🎲", id: "other" },
        { name: "سیاسەت", icon: "🏛️", id: "politics" },
        { name: "زۆرانبازی", icon: "🤼", id: "wrestling" },
        { name: "پێشبڕکێی بەلەم", icon: "🚣", id: "rowing" },
        { name: "سپرفینگ", icon: "🏄", id: "surfing" },
        { name: "گۆڵف", icon: "⛳", id: "golf" },
        { name: "بۆڵینگ", icon: "🎳", id: "bowling" },
        { name: "Hurling", icon: "🏑", id: "hurling" },
        { name: "لاکرۆس", icon: "🥍", id: "lacrosse" },
        { name: "نێت باڵ", icon: "🏐", id: "netball" },
        { name: "گایلیک فۆتباڵ", icon: "⚽", id: "gaelic" }
    ];

    const matches = [
        { teamA: "بەڕازیل", teamB: "ئەرجەنتین", time: "18:00", date: "2024-06-11", odds: { teamA: 2.10, teamB: 1.85 }, sport: "football", viewers: "2.5M" },
        { teamA: "فەڕەنسا", teamB: "ئینگلتەرا", time: "21:00", date: "2024-06-11", odds: { teamA: 2.00, teamB: 1.95 }, sport: "football", viewers: "2.1M" },
        { teamA: "ڕۆژئاوا", teamB: "ھیلال", time: "20:00", date: "2024-06-11", odds: { teamA: 1.80, teamB: 2.20 }, sport: "football", viewers: "1.8M" },
        { teamA: "نادال", teamB: "جۆکۆڤیچ", time: "16:00", date: "2024-06-11", odds: { teamA: 1.95, teamB: 1.90 }, sport: "tennis", viewers: "1.5M" },
        { teamA: "لەیکەرز", teamB: "واریرز", time: "02:00", date: "2024-06-12", odds: { teamA: 2.20, teamB: 1.75 }, sport: "basketball", viewers: "1.2M" },
        { teamA: "ئیتاڵیا", teamB: "ئیسپانیا", time: "19:00", date: "2024-06-11", odds: { teamA: 2.30, teamB: 1.70 }, sport: "football", viewers: "2.0M" },
        { teamA: "ئەڵمانیا", teamB: "ھۆڵەندا", time: "17:00", date: "2024-06-11", odds: { teamA: 2.15, teamB: 1.80 }, sport: "football", viewers: "1.9M" },
        { teamA: "پورتوگال", teamB: "بەلجیکا", time: "20:30", date: "2024-06-11", odds: { teamA: 2.05, teamB: 1.88 }, sport: "football", viewers: "1.7M" },
        { teamA: "مەغریب", teamB: "میسر", time: "18:30", date: "2024-06-11", odds: { teamA: 2.40, teamB: 1.60 }, sport: "football", viewers: "1.4M" }
    ];

    let currentSport = "football";
    let currentTimeFilter = "all";
    let currentUser = null;
    let userPoints = 1000;
    let currentMatchSlide = 0;
    let matchSlideInterval;

    function renderSportsList() {
        const container = document.getElementById('sportsList');
        if(!container) return;
        container.innerHTML = '';
        sports.forEach(sport => {
            const sportDiv = document.createElement('div');
            sportDiv.className = `sport-item ${currentSport === sport.id ? 'active' : ''}`;
            sportDiv.dataset.sport = sport.id;
            sportDiv.innerHTML = `<div class="sport-icon">${sport.icon}</div><div class="sport-name">${sport.name}</div>`;
            sportDiv.addEventListener('click', () => {
                document.querySelectorAll('.sport-item').forEach(item => item.classList.remove('active'));
                sportDiv.classList.add('active');
                currentSport = sport.id;
                renderMatchesList();
                renderTopMatchesSlider();
            });
            container.appendChild(sportDiv);
        });
    }

    function initTimeFilters() {
        document.querySelectorAll('.time-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeFilter = btn.dataset.time;
                renderMatchesList();
            });
        });
    }

    function renderTopMatchesSlider() {
        const container = document.getElementById('topMatchesSlider');
        const dotsContainer = document.getElementById('matchSliderDots');
        if(!container) return;
        const topMatches = matches.filter(m => m.sport === currentSport).slice(0, 10);
        if(topMatches.length === 0) {
            container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;">هیچ یاریەک نییە</div>';
            if(dotsContainer) dotsContainer.innerHTML = '';
            return;
        }
        container.innerHTML = '';
        topMatches.forEach((match, index) => {
            const slide = document.createElement('div');
            slide.className = `match-slide ${index === 0 ? 'active' : ''}`;
            slide.innerHTML = `
                <div class="match-card-slider">
                    <div class="match-teams-slider"><span>${match.teamA}</span><span style="color:#f5b042;">vs</span><span>${match.teamB}</span></div>
                    <div class="match-odds-slider"><span>${match.teamA}: ${match.odds.teamA}</span><span>${match.teamB}: ${match.odds.teamB}</span></div>
                    <div class="match-time">${match.time} | بینەر: ${match.viewers}</div>
                    <div><button class="match-bet-btn" data-team="${match.teamA}" data-odds="${match.odds.teamA}">پێشبینی ${match.teamA}</button>
                    <button class="match-bet-btn" data-team="${match.teamB}" data-odds="${match.odds.teamB}">پێشبینی ${match.teamB}</button></div>
                </div>
            `;
            container.appendChild(slide);
        });
        if(dotsContainer) {
            dotsContainer.innerHTML = '';
            for(let i = 0; i < topMatches.length; i++) {
                const dot = document.createElement('span');
                dot.className = `match-dot ${i === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToMatchSlide(i));
                dotsContainer.appendChild(dot);
            }
        }
        function showMatchSlide(index) {
            const slides = document.querySelectorAll('.match-slide');
            const dots = document.querySelectorAll('.match-dot');
            if(!slides.length) return;
            if(index >= slides.length) index = 0;
            if(index < 0) index = slides.length - 1;
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            if(dots[index]) dots[index].classList.add('active');
            currentMatchSlide = index;
        }
        window.goToMatchSlide = function(index) { showMatchSlide(index); resetMatchInterval(); };
        function nextMatchSlide() { goToMatchSlide(currentMatchSlide + 1); }
        function resetMatchInterval() { if(matchSlideInterval) clearInterval(matchSlideInterval); matchSlideInterval = setInterval(nextMatchSlide, 5000); }
        showMatchSlide(0); resetMatchInterval();
        document.querySelectorAll('.match-bet-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(!currentUser) { alert('تکایە یەکەمجار چوونەژوورەوە بکە'); window.location.href = 'login.html'; return; }
                alert(`پێشبینی بۆ ${btn.dataset.team} بە ئۆدەسی ${btn.dataset.odds} تۆمارکرا`);
            });
        });
    }

    function renderMatchesList() {
        const container = document.getElementById('matchesList');
        if(!container) return;
        let filteredMatches = matches.filter(m => m.sport === currentSport);
        container.innerHTML = '';
        if(filteredMatches.length === 0) { container.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">هیچ یاریەک نییە بۆ ئەم وەرزشە</div>'; return; }
        filteredMatches.forEach(match => {
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match-item';
            matchDiv.innerHTML = `
                <div class="match-info"><div class="match-teams">${match.teamA} vs ${match.teamB}</div><div class="match-time">${match.time} | بینەر: ${match.viewers}</div></div>
                <div class="match-points">${match.odds.teamA} / ${match.odds.teamB}</div>
                <button class="predict-btn" onclick="alert('پێشبینی تۆمارکرا')">پێشبینی</button>
            `;
            container.appendChild(matchDiv);
        });
    }

    function loadUserFromStorage() {
        const saved = localStorage.getItem('currentUser');
        const authSection = document.getElementById('authSection');
        if(saved) {
            try {
                currentUser = JSON.parse(saved);
                userPoints = currentUser.points || 1000;
                if(authSection) authSection.innerHTML = `<div class="user-info"><div class="coin-icon-nav">🪙<span class="points-value">${userPoints}</span></div><div class="diamond-icon-nav">💎<span class="diamond-value">${currentUser.diamonds || 0}</span></div></div>`;
                document.getElementById('menuUsername').innerText = currentUser.username;
            } catch(e) {}
        } else {
            if(authSection) authSection.innerHTML = `<button class="login-btn-nav" id="showLoginBtn">چوونەژوورەوە</button>`;
            document.getElementById('showLoginBtn')?.addEventListener('click', () => window.location.href = 'login.html');
        }
    }

    function initMenu() {
        const menuBtn = document.getElementById('menuToggleBtn');
        const hamburgerIcon = document.getElementById('hamburgerIcon');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        const menuShortBtn = document.getElementById('menuShortBtn');
        function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); if(hamburgerIcon) hamburgerIcon.classList.remove('open'); }
        function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); if(hamburgerIcon) hamburgerIcon.classList.add('open'); }
        if(menuBtn) menuBtn.addEventListener('click', (e) => { e.stopPropagation(); if(sideMenu.classList.contains('open')) closeMenu(); else openMenu(); });
        if(menuShortBtn) menuShortBtn.addEventListener('click', openMenu);
        if(overlay) overlay.addEventListener('click', closeMenu);
        document.getElementById('logoutLink')?.addEventListener('click', (e) => { e.preventDefault(); localStorage.removeItem('currentUser'); window.location.href = 'index.html'; });
    }

    function initBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const navType = item.dataset.nav;
                if(navType === 'home') window.location.href = 'index.html';
                else if(navType === 'mybets' && !currentUser) alert('تکایە چوونەژوورەوە بکە');
                else alert('بەم زوانە زیاد دەکرێت');
            });
        });
    }

    function initTabs() {
        document.querySelectorAll('.sports-tab[data-tab]').forEach(tab => {
            tab.addEventListener('click', () => { alert(`${tab.innerText} - بەم زوانە زیاد دەکرێت`); });
        });
        document.getElementById('refreshHomeBtn')?.addEventListener('click', () => { window.location.reload(); });
    }

    document.getElementById('searchBtn')?.addEventListener('click', () => alert('🔎 گەران - بەم زوانە زیاد دەکرێت'));

    document.addEventListener('DOMContentLoaded', () => {
        loadUserFromStorage();
        renderSportsList();
        initTimeFilters();
        renderTopMatchesSlider();
        renderMatchesList();
        initMenu();
        initBottomNav();
        initTabs();
    });
</script>
</body>
</html>
