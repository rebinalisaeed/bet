<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>وەرزشەکان - پێشبڕکێی گەل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kurdliga Regular', 'Segoe UI', system-ui, sans-serif;
            background: #0f1119;
            color: #eef2ff;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .sports-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 12px;
            height: calc(100vh - 130px);
            overflow-y: auto;
        }

        /* نێویگەیشنی سەرەوە - پانایی تەواو، لاکانی ڕێک (بێ کەوانە) */
        .sports-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: #1a1e2c;
            padding: 8px 16px;
            margin-bottom: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            width: 100%;
            border-radius: 0;
        }

        .sports-tabs::-webkit-scrollbar {
            height: 3px;
        }

        .sports-tab {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #aaa;
            font-family: 'Kurdliga Regular', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .sports-tab.active {
            background: #f5b042;
            color: #0a0c12;
            font-family: 'Kurdliga Bold', sans-serif;
        }

        .fixed-buttons {
            display: flex;
            gap: 12px;
            margin-left: auto;
            margin-right: 10px;
        }

        /* ئایکۆنی گەڕان - شێوازی سادە و جوان */
        .search-btn {
            background: transparent;
            border: 1px solid #2e3448;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            color: #aaa;
        }

        .search-btn:hover {
            background: #f5b042;
            border-color: #f5b042;
            color: #0a0c12;
        }

        /* لیستی وەرزشەکان - بۆکس لەسەر پاشبنەما */
        .sports-list-wrapper {
            background: #1a1e2c;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 8px 0;
        }

        .sports-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 8px 12px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .sports-list::-webkit-scrollbar {
            height: 4px;
        }

        .sport-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 70px;
            padding: 10px 8px;
            background: #252a3a;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2e3448;
        }

        .sport-item.active {
            border-color: #f5b042;
            background: #f5b04220;
        }

        .sport-item:hover {
            transform: translateY(-2px);
            border-color: #f5b04250;
        }

        .sport-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sport-item.disabled:hover {
            transform: none;
        }

        .sport-icon {
            font-size: 1.6rem;
        }

        .sport-name {
            font-size: 0.7rem;
            color: #ddd;
            white-space: nowrap;
        }

        /* سلایدەر */
        .matches-slider-container {
            position: relative;
            width: 100vw;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            height: 360px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1e2c, #0f1220);
            border-top: 2px solid #f5b04230;
            border-bottom: 2px solid #f5b04230;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .matches-slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .match-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .match-slide.active {
            opacity: 1;
            visibility: visible;
        }

        .match-card-slider {
            background: #0f1119cc;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px 25px;
            text-align: center;
            width: 80%;
            max-width: 500px;
            border: 1px solid #f5b04240;
        }

        .match-teams-slider {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .match-odds-slider {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 12px 0;
        }

        .match-odds-slider span {
            background: #1f2538;
            padding: 5px 12px;
            border-radius: 20px;
            color: #FFD966;
            font-weight: bold;
        }

        .match-bet-btn {
            background: #f5b042;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #0a0c12;
            cursor: pointer;
            margin: 4px;
        }

        .match-slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .match-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .match-dot.active {
            background: #f5b042;
            width: 22px;
            border-radius: 10px;
        }

        /* لیستی یارییەکان */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .match-item {
            background: #1a1e2c;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #2a2d3a;
        }

        .match-info {
            flex: 1;
        }

        .match-teams {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .match-time {
            font-size: 0.65rem;
            color: #aaa;
        }

        .match-points {
            background: #1f2538;
            padding: 4px 12px;
            border-radius: 20px;
            color: #FFD966;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .predict-btn {
            background: #2e3a4e;
            border: none;
            padding: 5px 14px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .live-tag {
            background: #ff4444;
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 15px;
            margin-left: 6px;
        }

        @media (max-width: 550px) {
            .sports-tab {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            .search-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .sport-item {
                min-width: 60px;
                padding: 8px 5px;
            }
            .sport-icon {
                font-size: 1.3rem;
            }
            .sport-name {
                font-size: 0.6rem;
            }
            .matches-slider-container {
                height: 280px;
            }
            .match-teams-slider {
                font-size: 0.85rem;
                gap: 8px;
            }
            .match-card-slider {
                padding: 12px 15px;
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <button class="menu-toggle" id="menuToggleBtn">
            <div class="hamburger-icon" id="hamburgerIcon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>
    <div class="nav-center">
        <img src="images/logo.png" alt="Logo" class="logo-img" onerror="this.src='https://placehold.co/80x50?text=🏆'">

        <div id="authSection"></div>

<div class="side-menu" id="sideMenu">

        <span>👤</span>
        <span id="menuUsername">میوان</span>
    </div>
    <a href="index.html">🏠 پێشەکی</a>
    <a href="#">🏆 ڕانکینگ</a>
    <a href="#">📋 مێژووی پێشبینییەکان</a>
    <a href="#">💬 پشتگیری</a>

    <a href="#" id="logoutLink">🚪 چوونەدەرەوە</a>

<div class="overlay" id="overlay"></div>

<div class="sports-container">
    
    <div class="sports-tabs">
        <div class="fixed-buttons">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <button class="sports-tab active" id="homeTab">سەرەتا</button>
        <button class="sports-tab" data-tab="live">ڕاستەوخۆ</button>
        <button class="sports-tab" data-tab="sports">وەرزشەکان</button>

    <div class="matches-slider-container">
        <div class="matches-slider" id="topMatchesSlider"></div>
        <div class="match-slider-dots" id="matchSliderDots"></div>
    </div>

    <!-- لیستی یارییەکان -->

<div class="bottom-nav">

    <button class="nav-item" data-nav="live"><span>📡</span><span>ڕاستەوخۆ</span></button>
    <button class="nav-item" data-nav="mybets"><span>🎯</span><span>پێشبینیەکانم</span></button>
    <button class="nav-item" data-nav="rank"><span>🏆</span><span>ڕێزبەندی</span></button>
</div>

<script>
    // ========== داتاکانی وەرزشەکان ==========
    const sports = [
        { name: "هەموو", icon: "⭐", id: "all" },
        { name: "تۆپی پێ", icon: "⚽", id: "football" },
        { name: "تێنس", icon: "🎾", id: "tennis" },
        { name: "بالە", icon: "🏐", id: "volleyball" },
        { name: "تۆپی دەست", icon: "🤾", id: "handball" },
        { name: "باسکە", icon: "🏀", id: "basketball" },
        { name: "تێنسی مێز", icon: "🏓", id: "tabletennis" }
    ];

    // ========== داتاکانی یارییەکان ==========
    const allMatches = [
        { teamA: "بەڕازیل", teamB: "ئەرجەنتین", time: "18:00", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 18, 0), odds: { teamA: 2.10, teamB: 1.85 }, sport: "football", viewers: "2.5M" },
        { teamA: "فەڕەنسا", teamB: "ئینگلتەرا", time: "21:00", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 21, 0), odds: { teamA: 2.00, teamB: 1.95 }, sport: "football", viewers: "2.1M" },
        { teamA: "ئیتاڵیا", teamB: "ئیسپانیا", time: "19:15", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 19, 15), odds: { teamA: 2.30, teamB: 1.70 }, sport: "football", viewers: "2.0M" },
        { teamA: "ئەڵمانیا", teamB: "ھۆڵەندا", time: "17:00", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 17, 0), odds: { teamA: 2.15, teamB: 1.80 }, sport: "football", viewers: "1.9M" },
        { teamA: "پورتوگال", teamB: "بەلجیکا", time: "20:30", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 20, 30), odds: { teamA: 2.05, teamB: 1.88 }, sport: "football", viewers: "1.7M" },
        { teamA: "ئیسپانیا", teamB: "ئیتاڵیا", time: "16:00", date: "2024-06-16", dateObj: new Date(2024, 5, 16, 16, 0), odds: { teamA: 1.95, teamB: 2.05 }, sport: "football", viewers: "1.8M" },
        { teamA: "نادال", teamB: "جۆکۆڤیچ", time: "14:30", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 14, 30), odds: { teamA: 1.95, teamB: 1.90 }, sport: "tennis", viewers: "1.5M" },
        { teamA: "فێدێرەر", teamB: "موری", time: "16:45", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 16, 45), odds: { teamA: 1.80, teamB: 2.10 }, sport: "tennis", viewers: "1.2M" },
        { teamA: "لەیکەرز", teamB: "واریرز", time: "02:00", date: "2024-06-16", dateObj: new Date(2024, 5, 16, 2, 0), odds: { teamA: 2.20, teamB: 1.75 }, sport: "basketball", viewers: "1.2M" },
        { teamA: "شیکاگۆ", teamB: "بۆستن", time: "03:30", date: "2024-06-16", dateObj: new Date(2024, 5, 16, 3, 30), odds: { teamA: 1.95, teamB: 2.05 }, sport: "basketball", viewers: "1.0M" },
        { teamA: "بەڕازیل", teamB: "پۆڵەندا", time: "15:00", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 15, 0), odds: { teamA: 1.85, teamB: 2.10 }, sport: "volleyball", viewers: "0.9M" },
        { teamA: "ئەمریکا", teamB: "ڕووسیا", time: "19:00", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 19, 0), odds: { teamA: 1.90, teamB: 2.00 }, sport: "volleyball", viewers: "0.8M" },
        { teamA: "فەڕەنسا", teamB: "دانمارک", time: "17:30", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 17, 30), odds: { teamA: 1.90, teamB: 2.00 }, sport: "handball", viewers: "0.8M" },
        { teamA: "ما لۆنگ", teamB: "فان زێندۆنگ", time: "12:00", date: "2024-06-15", dateObj: new Date(2024, 5, 15, 12, 0), odds: { teamA: 1.75, teamB: 2.20 }, sport: "tabletennis", viewers: "0.7M" }
    ];

    let currentSport = "all";
    let currentUser = null;
    let userPoints = 1000;
    let currentMatchSlide = 0;
    let matchSlideInterval;
    let fullscreenRequested = false;

    // فەنکشنی پاڵاوتنی یارییەکان
    function getFilteredMatches() {
        const now = new Date();
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const dayAfterTomorrow = new Date(today);
        dayAfterTomorrow.setDate(dayAfterTomorrow.getDate() + 2);
        
        let filtered = allMatches.filter(match => {
            if (currentSport !== "all" && match.sport !== currentSport) {
                return false;
            }
            return match.dateObj >= today && match.dateObj < dayAfterTomorrow;
        });
        
        filtered = filtered.filter(match => {
            const matchTime = new Date(match.dateObj);
            const timeToMatch = matchTime - now;
            return timeToMatch > 15 * 60 * 1000;
        });
        
        filtered.sort((a, b) => a.dateObj - b.dateObj);
        return filtered;
    }

    // فەنکشنی فۆرماتکردنی پۆینت
    function formatPoints(points) {
        let rounded = Math.round(points * 1000) / 1000;
        let parts = rounded.toFixed(3).split('.');
        let integerPart = parseInt(parts[0]).toLocaleString('en-US');
        let decimalPart = parts[1];
        return `${integerPart}.${decimalPart}`;
    }

    // ========== رێنمایی لیستی وەرزشەکان ==========
    function renderSportsList() {
        const container = document.getElementById('sportsList');
        if (!container) return;
        
        container.innerHTML = '';
        sports.forEach(sport => {
            const sportDiv = document.createElement('div');
            const isAllSport = sport.id === "all";
            sportDiv.className = `sport-item ${currentSport === sport.id ? 'active' : ''} ${!isAllSport ? 'disabled' : ''}`;
            sportDiv.dataset.sport = sport.id;
            sportDiv.innerHTML = `
                <div class="sport-icon">${sport.icon}</div>
                <div class="sport-name">${sport.name}</div>
            `;
            
            if (isAllSport) {
                sportDiv.addEventListener('click', () => {
                    document.querySelectorAll('.sport-item').forEach(item => item.classList.remove('active'));
                    sportDiv.classList.add('active');
                    currentSport = sport.id;
                    renderMatchesList();
                    renderTopMatchesSlider();
                });
            }
            
            container.appendChild(sportDiv);
        });
    }

    // ========== سلایدەر ==========
    function renderTopMatchesSlider() {
        const container = document.getElementById('topMatchesSlider');
        const dotsContainer = document.getElementById('matchSliderDots');
        if (!container) return;
        
        let topMatches = getFilteredMatches();
        topMatches = topMatches.slice(0, 10);
        
        if (topMatches.length === 0) {
            container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;">هیچ یاریەک نییە</div>';
            if (dotsContainer) dotsContainer.innerHTML = '';
            return;
        }
        
        container.innerHTML = '';
        topMatches.forEach((match, index) => {
            const slide = document.createElement('div');
            slide.className = `match-slide ${index === 0 ? 'active' : ''}`;
            slide.innerHTML = `
                <div class="match-card-slider">
                    <div class="match-teams-slider">
                        <span>${match.teamA}</span>
                        <span style="color:#f5b042;">vs</span>
                        <span>${match.teamB}</span>
                    </div>
                    <div class="match-odds-slider">
                        <span>${match.teamA}: ${match.odds.teamA}</span>
                        <span>${match.teamB}: ${match.odds.teamB}</span>
                    </div>
                    <div class="match-time">${match.date} | ${match.time} | بینەر: ${match.viewers}</div>
                    <div>
                        <button class="match-bet-btn" data-team="${match.teamA}" data-odds="${match.odds.teamA}">پێشبینی ${match.teamA}</button>
                        <button class="match-bet-btn" data-team="${match.teamB}" data-odds="${match.odds.teamB}">پێشبینی ${match.teamB}</button>
                    </div>
                </div>
            `;
            container.appendChild(slide);
        });
        
        if (dotsContainer) {
            dotsContainer.innerHTML = '';
            for (let i = 0; i < topMatches.length; i++) {
                const dot = document.createElement('span');
                dot.className = `match-dot ${i === 0 ? 'active' : ''}`;
                dot.addEventListener('click', (function(idx) {
                    return function() { goToMatchSlide(idx); };
                })(i));
                dotsContainer.appendChild(dot);
            }
        }
        
        function showMatchSlide(index) {
            const slides = document.querySelectorAll('.match-slide');
            const dots = document.querySelectorAll('.match-dot');
            if (!slides.length) return;
            if (index >= slides.length) index = 0;
            if (index < 0) index = slides.length - 1;
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            if (dots[index]) dots[index].classList.add('active');
            currentMatchSlide = index;
        }
        
        window.goToMatchSlide = function(index) {
            showMatchSlide(index);
            resetMatchInterval();
        };
        
        function nextMatchSlide() {
            goToMatchSlide(currentMatchSlide + 1);
        }
        
        function resetMatchInterval() {
            if (matchSlideInterval) clearInterval(matchSlideInterval);
            matchSlideInterval = setInterval(nextMatchSlide, 5000);
        }
        
        showMatchSlide(0);
        resetMatchInterval();
        
        document.querySelectorAll('.match-bet-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!currentUser) {
                    alert('تکایە یەکەمجار چوونەژوورەوە بکە');
                    window.location.href = 'login.html';
                    return;
                }
                alert(`پێشبینی بۆ ${btn.dataset.team} بە ئۆدەسی ${btn.dataset.odds} تۆمارکرا`);
            });
        });
    }

    // ========== لیستی یارییەکان ==========
    function renderMatchesList() {
        const container = document.getElementById('matchesList');
        if (!container) return;
        
        const filteredMatches = getFilteredMatches();
        
        container.innerHTML = '';
        if (filteredMatches.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">هیچ یاریەک نییە بۆ ئەم وەرزشە</div>';
            return;
        }
        
        filteredMatches.forEach(match => {
            const now = new Date();
            const matchTime = new Date(match.dateObj);
            const isLive = (matchTime - now) <= 0 && (matchTime - now) > -7200000;
            
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match-item';
            matchDiv.innerHTML = `
                <div class="match-info">
                    <div class="match-teams">
                        ${match.teamA} vs ${match.teamB}
                        ${isLive ? '<span class="live-tag">لایڤ</span>' : ''}
                    </div>
                    <div class="match-time">${match.date} | ${match.time} | بینەر: ${match.viewers}</div>
                </div>
                <div class="match-points">${match.odds.teamA} / ${match.odds.teamB}</div>
                <button class="predict-btn" onclick="alert('پێشبینی تۆمارکرا')">پێشبینی</button>
            `;
            container.appendChild(matchDiv);
        });
    }

    let refreshInterval;
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            renderMatchesList();
            renderTopMatchesSlider();
        }, 30000);
    }

    // ========== چوونەژوورەوە ==========
    function loadUserFromStorage() {
        const saved = localStorage.getItem('currentUser');
        const authSection = document.getElementById('authSection');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                userPoints = currentUser.points || 1000;
                if (authSection) {
                    authSection.innerHTML = `
                        <div class="user-info">
                            <div class="coin-icon-nav">
                                <img src="images/coinicon.png" alt="Coin" class="coin-img-nav" onerror="this.src='https://placehold.co/24x24?text=🪙'">
                                <span class="points-value">${formatPoints(userPoints)}</span>
                            </div>
                            <div class="diamond-icon-nav">
                                <span style="font-size:1.1rem;">💎</span>
                                <span class="diamond-value">${currentUser.diamonds || 0}</span>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('menuUsername').innerText = currentUser.username;
            } catch(e) {}
        } else {
            if (authSection) {
                authSection.innerHTML = `<button class="login-btn-nav" id="showLoginBtn">چوونەژوورەوە</button>`;
                document.getElementById('showLoginBtn')?.addEventListener('click', () => window.location.href = 'login.html');
            }
        }
    }

    // ========== مێنوو ==========
    function initMenu() {
        const menuBtn = document.getElementById('menuToggleBtn');
        const hamburgerIcon = document.getElementById('hamburgerIcon');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        
        function closeMenu() {
            sideMenu.classList.remove('open');
            overlay.classList.remove('active');
            if (hamburgerIcon) hamburgerIcon.classList.remove('open');
        }
        
        if (menuBtn) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpening = !sideMenu.classList.contains('open');
                sideMenu.classList.toggle('open');
                overlay.classList.toggle('active');
                if (hamburgerIcon) hamburgerIcon.classList.toggle('open');
            });
        }
        
        if (overlay) overlay.addEventListener('click', closeMenu);
        
        document.getElementById('logoutLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
    }

    // ========== تاسک بار ==========
    function initBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const navType = item.dataset.nav;
                if (navType === 'home') window.location.href = 'index.html';
                else if (navType === 'mybets' && !currentUser) alert('تکایە چوونەژوورەوە بکە');
                else alert('بەم زوانە زیاد دەکرێت');
            });
        });
    }

    // ========== تەبەکان ==========
    function initTabs() {
        document.querySelectorAll('.sports-tab[data-tab]').forEach(tab => {
            tab.addEventListener('click', () => {
                alert(`${tab.innerText} - بەم زوانە زیاد دەکرێت`);
            });
        });
        document.getElementById('homeTab')?.addEventListener('click', () => {
            window.location.reload();
        });
    }

    document.getElementById('searchBtn')?.addEventListener('click', () => alert('🔍 گەران - بەم زوانە زیاد دەکرێت'));

    // ========== فول سکرین ==========
    function initFullscreenOnFirstInteraction() {
        if (fullscreenRequested) return;
        
        const requestFullscreen = () => {
            if (!fullscreenRequested && !document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
                fullscreenRequested = true;
            }
        };
        
        document.body.addEventListener('click', requestFullscreen, { once: true });
        document.body.addEventListener('touchstart', requestFullscreen, { once: true });
    }

    // ========== دەستپێکردن ==========
    document.addEventListener('DOMContentLoaded', () => {
        loadUserFromStorage();
        renderSportsList();
        renderTopMatchesSlider();
        renderMatchesList();
        initMenu();
        initBottomNav();
        initTabs();
        initFullscreenOnFirstInteraction();
        startAutoRefresh();
    });
</script>
</body>
</html>
