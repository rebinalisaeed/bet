<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>وەرزشەکان - پێشبڕکێی گەل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستایلی تایبەت بە پەڕەی وەرزشەکان */
        .sports-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 12px;
            height: calc(100vh - 130px);
            overflow-y: auto;
        }

        /* نێویگەیشنی سەرەوە (تەب) */
        .sports-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1e2c;
            padding: 8px;
            border-radius: 50px;
            margin-bottom: 15px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .sports-tabs::-webkit-scrollbar {
            height: 3px;
        }

        .sports-tab {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #aaa;
            font-family: 'Kurdliga Regular', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .sports-tab.active {
            background: #f5b042;
            color: #0a0c12;
            font-family: 'Kurdliga Bold', sans-serif;
        }

        /* دوگمەی search و menu - fixed */
        .fixed-buttons {
            display: flex;
            gap: 8px;
            margin-right: auto;
        }

        .icon-btn {
            background: #2e3a4e;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: #f5b042;
            transform: scale(0.95);
        }

        /* لیستی وەرزشەکان (ئاسۆیی - scrollable) */
        .sports-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 10px 0 15px 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .sports-list::-webkit-scrollbar {
            height: 4px;
        }

        .sport-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 65px;
            padding: 10px 8px;
            background: #1a1e2c;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2a2d3a;
        }

        .sport-item.active {
            border-color: #f5b042;
            background: #f5b04220;
        }

        .sport-item:hover {
            transform: translateY(-3px);
            border-color: #f5b04250;
        }

        .sport-icon {
            font-size: 1.8rem;
        }

        .sport-name {
            font-size: 0.7rem;
            color: #ddd;
            white-space: nowrap;
        }

        /* فیلتەری کات */
        .time-filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0 15px 0;
            scrollbar-width: thin;
            margin-top: 5px;
        }

        .time-filter {
            background: #1e2335;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .time-filter.active {
            background: #f5b042;
            color: #0a0c12;
            font-family: 'Kurdliga Bold', sans-serif;
        }

        /* سلایدەری یارییەکان */
        .matches-slider-container {
            position: relative;
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1e2c, #0f1220);
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid #f5b04230;
        }

        .matches-slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .match-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .match-slide.active {
            opacity: 1;
            visibility: visible;
        }

        .match-card-slider {
            background: #0f1119cc;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            width: 90%;
            border: 1px solid #f5b04240;
        }

        .match-teams-slider {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            font-size: 1rem;
        }

        .match-odds-slider {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
        }

        .match-odds-slider span {
            background: #1f2538;
            padding: 5px 12px;
            border-radius: 20px;
            color: #FFD966;
            font-weight: bold;
        }

        .match-bet-btn {
            background: #f5b042;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #0a0c12;
            cursor: pointer;
        }

        /* خاڵەکانی سلایدەری یاری */
        .match-slider-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .match-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .match-dot.active {
            background: #f5b042;
            width: 16px;
            border-radius: 8px;
        }

        /* لیستی یارییەکان */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            padding-bottom: 20px;
        }

        .match-item {
            background: #1a1e2c;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #2a2d3a;
        }

        .match-info {
            flex: 1;
        }

        .match-teams {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .match-time {
            font-size: 0.65rem;
            color: #aaa;
        }

        .match-points {
            background: #1f2538;
            padding: 5px 12px;
            border-radius: 20px;
            color: #FFD966;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .predict-btn {
            background: #2e3a4e;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        @media (max-width: 550px) {
            .sport-item {
                min-width: 55px;
                padding: 6px 4px;
            }
            .sport-icon {
                font-size: 1.4rem;
            }
            .sport-name {
                font-size: 0.6rem;
            }
            .time-filter {
                padding: 6px 12px;
                font-size: 0.65rem;
            }
            .match-teams-slider {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

        { name: "پێشبڕکێی بەلەم", icon: "🚣", id: "rowing" },

        { name: "گۆڵف", icon: "⛳", id: "golf" },
        { name: "بۆڵینگ", icon: "🎳", id: "bowling" },
        { name: "Hurling", icon: "🏑", id: "hurling" },
        { name: "لاکرۆس", icon: "🥍", id: "lacrosse" },
        { name: "نێت باڵ", icon: "🏐", id: "netball" },
        { name: "گایلیک فۆتباڵ", icon: "⚽", id: "gaelic" }
    ];

    // ========== داتاکانی یارییەکان ==========
    const matches = [
        { teamA: "بەڕازیل", teamB: "ئەرجەنتین", time: "18:00", date: "2024-06-11", odds: { teamA: 2.10, teamB: 1.85 }, sport: "football", viewers: "2.5M" },
        { teamA: "فەڕەنسا", teamB: "ئینگلتەرا", time: "21:00", date: "2024-06-11", odds: { teamA: 2.00, teamB: 1.95 }, sport: "football", viewers: "2.1M" },
        { teamA: "ڕۆژئاوا", teamB: "ھیلال", time: "20:00", date: "2024-06-11", odds: { teamA: 1.80, teamB: 2.20 }, sport: "football", viewers: "1.8M" },
        { teamA: "نادال", teamB: "جۆکۆڤیچ", time: "16:00", date: "2024-06-11", odds: { teamA: 1.95, teamB: 1.90 }, sport: "tennis", viewers: "1.5M" },
        { teamA: "لەیکەرز", teamB: "واریرز", time: "02:00", date: "2024-06-12", odds: { teamA: 2.20, teamB: 1.75 }, sport: "basketball", viewers: "1.2M" },
        { teamA: "ئیتاڵیا", teamB: "ئیسپانیا", time: "19:00", date: "2024-06-11", odds: { teamA: 2.30, teamB: 1.70 }, sport: "football", viewers: "2.0M" },
        { teamA: "ئەڵمانیا", teamB: "ھۆڵەندا", time: "17:00", date: "2024-06-11", odds: { teamA: 2.15, teamB: 1.80 }, sport: "football", viewers: "1.9M" },
        { teamA: "پورتوگال", teamB: "بەلجیکا", time: "20:30", date: "2024-06-11", odds: { teamA: 2.05, teamB: 1.88 }, sport: "football", viewers: "1.7M" },
        { teamA: "مەغریب", teamB: "میسر", time: "18:30", date: "2024-06-11", odds: { teamA: 2.40, teamB: 1.60 }, sport: "football", viewers: "1.4M" },
        { teamA: "ئیسرائیل", teamB: "ئوردن", time: "19:15", date: "2024-06-11", odds: { teamA: 1.75, teamB: 2.25 }, sport: "football", viewers: "1.1M" }
    ];

    let currentSport = "football";
    let currentTimeFilter = "all";
    let currentUser = null;
    let userPoints = 1000;

    // ========== رێنمایی لیستی وەرزشەکان ==========
    function renderSportsList() {
        const container = document.getElementById('sportsList');
        if(!container) return;
        
        container.innerHTML = '';
        sports.forEach(sport => {
            const sportDiv = document.createElement('div');
            sportDiv.className = `sport-item ${currentSport === sport.id ? 'active' : ''}`;
            sportDiv.dataset.sport = sport.id;
            sportDiv.innerHTML = `
                <div class="sport-icon">${sport.icon}</div>
                <div class="sport-name">${sport.name}</div>
            `;
            sportDiv.addEventListener('click', () => {
                document.querySelectorAll('.sport-item').forEach(item => item.classList.remove('active'));
                sportDiv.classList.add('active');
                currentSport = sport.id;
                renderMatchesList();
                renderTopMatchesSlider();
            });
            container.appendChild(sportDiv);
        });
    }

    // ========== فیلتەری کات ==========
    function initTimeFilters() {
        document.querySelectorAll('.time-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeFilter = btn.dataset.time;
                renderMatchesList();
            });
        });
    }

    // ========== سلایدەری سەرەکی یارییەکان ==========
    let currentMatchSlide = 0;
    let matchSlideInterval;

    function renderTopMatchesSlider() {
        const container = document.getElementById('topMatchesSlider');
        const dotsContainer = document.getElementById('matchSliderDots');
        if(!container) return;
        
        const topMatches = matches.filter(m => m.sport === currentSport).slice(0, 10);
        
        container.innerHTML = '';
        topMatches.forEach((match, index) => {
            const slide = document.createElement('div');
            slide.className = `match-slide ${index === 0 ? 'active' : ''}`;
            slide.innerHTML = `
                <div class="match-card-slider">
                    <div class="match-teams-slider">
                        <span>${match.teamA}</span>
                        <span style="color:#f5b042;">vs</span>
                        <span>${match.teamB}</span>
                    </div>
                    <div class="match-odds-slider">
                        <span>${match.teamA}: ${match.odds.teamA}</span>
                        <span>${match.teamB}: ${match.odds.teamB}</span>
                    </div>
                    <div class="match-time">${match.time} | بینەر: ${match.viewers}</div>
                    <button class="match-bet-btn" data-team="${match.teamA}" data-odds="${match.odds.teamA}">پێشبینی ${match.teamA}</button>
                    <button class="match-bet-btn" data-team="${match.teamB}" data-odds="${match.odds.teamB}">پێشبینی ${match.teamB}</button>
                </div>
            `;
            container.appendChild(slide);
        });
        
        if(dotsContainer) {
            dotsContainer.innerHTML = '';
            for(let i = 0; i < topMatches.length; i++) {
                const dot = document.createElement('span');
                dot.className = `match-dot ${i === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToMatchSlide(i));
                dotsContainer.appendChild(dot);
            }
        }
        
        function showMatchSlide(index) {
            const slides = document.querySelectorAll('.match-slide');
            const dots = document.querySelectorAll('.match-dot');
            if(!slides.length) return;
            if(index >= slides.length) index = 0;
            if(index < 0) index = slides.length - 1;
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            if(dots[index]) dots[index].classList.add('active');
            currentMatchSlide = index;
        }
        
        window.goToMatchSlide = function(index) {
            showMatchSlide(index);
            resetMatchInterval();
        };
        
        function nextMatchSlide() {
            goToMatchSlide(currentMatchSlide + 1);
        }
        
        function resetMatchInterval() {
            if(matchSlideInterval) clearInterval(matchSlideInterval);
            matchSlideInterval = setInterval(nextMatchSlide, 5000);
        }
        
        showMatchSlide(0);
        resetMatchInterval();
        
        document.querySelectorAll('.match-bet-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(!currentUser) {
                    alert('تکایە یەکەمجار چوونەژوورەوە بکە');
                    window.location.href = 'login.html';
                    return;
                }
                alert(`پێشبینی بۆ ${btn.dataset.team} بە ئۆدەسی ${btn.dataset.odds} تۆمارکرا`);
            });
        });
    }

    // ========== لیستی یارییەکان ==========
    function renderMatchesList() {
        const container = document.getElementById('matchesList');
        if(!container) return;
        
        let filteredMatches = matches.filter(m => m.sport === currentSport);
        
        const now = new Date();
        filteredMatches = filteredMatches.filter(m => {
            if(currentTimeFilter === 'today') return true;
            if(currentTimeFilter === 'morning') return parseInt(m.time) < 12;
            if(currentTimeFilter === '1h') return true;
            if(currentTimeFilter === '3h') return true;
            if(currentTimeFilter === '6h') return true;
            if(currentTimeFilter === '12h') return true;
            return true;
        });
        
        container.innerHTML = '';
        filteredMatches.forEach(match => {
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match-item';
            matchDiv.innerHTML = `
                <div class="match-info">
                    <div class="match-teams">${match.teamA} vs ${match.teamB}</div>
                    <div class="match-time">${match.time} | بینەر: ${match.viewers}</div>
                </div>
                <div class="match-points">${match.odds.teamA} / ${match.odds.teamB}</div>
                <button class="predict-btn" onclick="alert('پێشبینی تۆمارکرا')">پێشبینی</button>
            `;
            container.appendChild(matchDiv);
        });
    }

    // ========== چوونەژوورەوە ==========
    function loadUserFromStorage() {
        const saved = localStorage.getItem('currentUser');
        if(saved) {
            try {
                currentUser = JSON.parse(saved);
                userPoints = currentUser.points || 1000;
                document.getElementById('authSection').innerHTML = `
                    <div class="user-info">
                        <div class="coin-icon-nav">🪙<span class="points-value">${userPoints}</span></div>
                        <div class="diamond-icon-nav">💎<span class="diamond-value">${currentUser.diamonds || 0}</span></div>
                    </div>
                `;
                document.getElementById('menuUsername').innerText = currentUser.username;
            } catch(e) {}
        } else {
            document.getElementById('authSection').innerHTML = `<button class="login-btn-nav" id="showLoginBtn">چوونەژوورەوە</button>`;
            document.getElementById('showLoginBtn')?.addEventListener('click', () => window.location.href = 'login.html');
        }
    }

    // ========== مێنوو ==========
    function initMenu() {
        const menuBtn = document.getElementById('menuToggleBtn');
        const hamburgerIcon = document.getElementById('hamburgerIcon');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        const menuShortBtn = document.getElementById('menuShortBtn');
        
        function closeMenu() {
            sideMenu.classList.remove('open');
            overlay.classList.remove('active');
            if(hamburgerIcon) hamburgerIcon.classList.remove('open');
        }
        
        function openMenu() {
            sideMenu.classList.add('open');
            overlay.classList.add('active');
            if(hamburgerIcon) hamburgerIcon.classList.add('open');
        }
        
        if(menuBtn) menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if(sideMenu.classList.contains('open')) closeMenu();
            else openMenu();
        });
        
        if(menuShortBtn) menuShortBtn.addEventListener('click', openMenu);
        if(overlay) overlay.addEventListener('click', closeMenu);
        
        document.getElementById('logoutLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
    }

    // ========== تاسک بار ==========
    function initBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const navType = item.dataset.nav;
                if(navType === 'home') window.location.href = 'index.html';
                else if(navType === 'mybets' && !currentUser) alert('تکایە چوونەژوورەوە بکە');
                else alert('بەم زوانە زیاد دەکرێت');
            });
        });
    }

    // ========== تەبەکان ==========
    function initTabs() {
        document.querySelectorAll('.sports-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                if(tabId === 'home') window.location.href = 'index.html';
                else alert(`${tab.innerText} - بەم زوانە زیاد دەکرێت`);
            });
        });
    }

    document.getElementById('searchBtn')?.addEventListener('click', () => alert('🔍 گەران - بەم زوانە زیاد دەکرێت'));

    document.addEventListener('DOMContentLoaded', () => {
        loadUserFromStorage();
        renderSportsList();
        initTimeFilters();
        renderTopMatchesSlider();
        renderMatchesList();
        initMenu();
        initBottomNav();
        initTabs();
    });
</script>
</body>
</html>
