<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئەدمین پانێل - پێشبڕکێی گەل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1119;
            color: #eef2ff;
            padding: 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #1a1e2c, #0f1220);
            padding: 20px 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            border-bottom: 2px solid #f5b042;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 { font-size: 1.5rem; color: #FFD966; }
        .admin-header p { color: #aaa; font-size: 0.8rem; }
        .back-btn { background: #2e3a4e; border: none; padding: 10px 20px; border-radius: 40px; color: white; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .back-btn:hover { background: #f5b042; color: #0a0c12; }

        .slider-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .slider-selector-btn {
            background: #1a1e2c;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: #aaa;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .slider-selector-btn.active {
            background: #f5b042;
            color: #0a0c12;
            font-weight: bold;
        }

        .preview-section {
            background: #0f1119;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #2a2d3a;
            overflow: hidden;
        }

        .preview-title {
            background: #1a1e2c;
            padding: 12px 20px;
            border-bottom: 1px solid #f5b04230;
            font-weight: bold;
        }

        .slider-preview {
            position: relative;
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #1a1e2c, #0f1220);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
            padding: 15px;
        }

        .preview-slide img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 12px;
            background: #1f2538;
            padding: 8px;
        }

        .form-section {
            background: #1a1e2c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2a2d3a;
        }

        .form-title {
            font-size: 1.2rem;
            color: #FFD966;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f5b04230;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #ddd; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #1e2335;
            border: 1px solid #2e3448;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #f5b042; }

        .image-preview {
            width: 80px;
            height: 80px;
            background: #1e2335;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
        }

        .btn {
            background: #2e3a4e;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-primary { background: linear-gradient(95deg, #f5b042, #ff8c42); color: #0a0c12; font-weight: bold; }
        .btn-danger { background: #8b3c2c; }
        .btn-primary:hover, .btn-danger:hover { transform: scale(0.98); }

        .slides-list {
            background: #1a1e2c;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2d3a;
        }

        .slide-item {
            background: #0f1119;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid #2a2d3a;
        }

        .slide-item img { width: 50px; height: 50px; object-fit: contain; background: #1f2538; border-radius: 10px; padding: 5px; }
        .slide-info { flex: 1; }
        .slide-info h4 { color: #FFD966; font-size: 0.9rem; }
        .slide-info p { color: #aaa; font-size: 0.7rem; }
        .slide-actions button { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px 10px; border-radius: 8px; }
        .edit-btn { color: #FFD966; }
        .delete-btn { color: #ff6666; }
        .add-new { background: #f5b04220; border: 2px dashed #f5b042; justify-content: center; cursor: pointer; }
        .add-new:hover { background: #f5b04230; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="admin-header">
    <div><h1>🛠 ئەدمین پانێل</h1><p>بەڕێوەبردنی سلایدەرەکان</p></div>
    <a href="index.html" class="back-btn">🏠 گەڕانەوە بۆ پەڕەی سەرەکی</a>
</div>

<div class="slider-selector">
    <button class="slider-selector-btn active" data-slider="index">سلایدەری پەڕەی سەرەکی</button>
    <button class="slider-selector-btn" data-slider="sports">سلایدەری پەڕەی وەرزشەکان</button>
</div>

<div class="grid-2">
    <div class="form-section">
        <div class="form-title" id="formTitle">➕ زیادکردنی سلایدێکی نوێ</div>
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-group">
            <label>🖼️ وێنەی سپۆنسەر</label>
            <input type="text" id="slideImage" placeholder="https://example.com/image.png یان لە کۆمپیوتەرەوە هەڵبژێرە">
            <input type="file" id="imageUpload" accept="image/*" style="margin-top: 8px;">
            <div class="image-preview" id="imagePreview"><span style="color:#aaa;">پێشبینین</span></div>
        </div>
        <div class="form-group">
            <label>🏷️ سەردێڕ</label>
            <input type="text" id="slideTitle" placeholder="ناوی سپۆنسەرەکە">
        </div>
        <div class="form-group">
            <label>📝 تێکست</label>
            <textarea id="slideText" rows="2" placeholder="ڕوونکردنەوەی سپۆنسەر"></textarea>
        </div>
        <div class="form-group">
            <label>🔗 لینک</label>
            <input type="text" id="slideLink" placeholder="https://...">
        </div>
        <div><button class="btn btn-primary" id="saveBtn">💾 هەڵگرتن</button><button class="btn" id="cancelBtn">❌ پاککردنەوە</button></div>
    </div>

    <div class="preview-section">
        <div class="preview-title">👁️ پێشبینی سلایدەر</div>
        <div class="slider-preview" id="livePreview">
            <div class="preview-slide">
                <img src="" alt="پێشبینی" id="previewImage" style="display: none;">
                <div class="preview-content"><h3 id="previewTitle">سەردێڕ</h3><p id="previewText">تێکست</p></div>
            </div>
        </div>
    </div>
</div>

<div class="slides-list">
    <div class="form-title">📋 لیستی سلایدەرەکان</div>
    <div id="slidesContainer"></div>
    <div class="slide-item add-new" id="addNewBtn"><span>➕</span><div class="slide-info"><h4>سلایدێکی نوێ زیاد بکە</h4><p>کلیک بکە بۆ زیادکردنی سلایدەری نوێ</p></div></div>
</div>

<script>
    let currentSliderType = "index";
    let indexSlides = [
        { id: 1, image: "https://placehold.co/70x70?text=🏆", title: "سپۆنسەری سەرەکی", text: "کۆمپانیی ئاسیاسێل", link: "" },
        { id: 2, image: "https://placehold.co/70x70?text=📱", title: "Zain Cash", text: "پارەدانێکی ئاسان و خێرا", link: "" },
        { id: 3, image: "https://placehold.co/70x70?text=💳", title: "بکات کارتی", text: "کارتی فیزیکی و ئەلیکترۆنی", link: "" },
        { id: 4, image: "https://placehold.co/70x70?text=🏆", title: "پێشبڕکێی گەل", text: "بەشداری بکە و 1000 پۆینت وەربگرە", link: "" },
        { id: 5, image: "https://placehold.co/70x70?text=⚽", title: "مۆندیال 2026", text: "پێشبینی یارییەکان بکە", link: "" }
    ];
    let sportsSlides = [
        { id: 1, image: "https://placehold.co/70x70?text=⚽", title: "تۆپی پێ", text: "خولەکانی تۆپی پێ", link: "" },
        { id: 2, image: "https://placehold.co/70x70?text=🏀", title: "باسکە", text: "خولی NBA و یۆرۆلیگ", link: "" },
        { id: 3, image: "https://placehold.co/70x70?text=🎾", title: "تێنس", text: "گراند سلێمەکان", link: "" }
    ];
    let nextIdIndex = 6, nextIdSports = 4;
    let currentSlides = [...indexSlides];
    let editMode = false;

    function saveToStorage() { localStorage.setItem('adminIndexSlides', JSON.stringify(indexSlides)); localStorage.setItem('adminSportsSlides', JSON.stringify(sportsSlides)); updatePageSliders(); }
    function loadFromStorage() {
        const savedIndex = localStorage.getItem('adminIndexSlides');
        const savedSports = localStorage.getItem('adminSportsSlides');
        if(savedIndex) { try { indexSlides = JSON.parse(savedIndex); nextIdIndex = Math.max(...indexSlides.map(s => s.id), 0) + 1; } catch(e) {} }
        if(savedSports) { try { sportsSlides = JSON.parse(savedSports); nextIdSports = Math.max(...sportsSlides.map(s => s.id), 0) + 1; } catch(e) {} }
        updateCurrentSlides();
    }
    function updateCurrentSlides() { currentSlides = currentSliderType === "index" ? [...indexSlides] : [...sportsSlides]; renderSlidesList(); }
    function updatePageSliders() { localStorage.setItem('homepageSlides', JSON.stringify(indexSlides)); localStorage.setItem('sportsPageSlides', JSON.stringify(sportsSlides)); }
    function renderSlidesList() {
        const container = document.getElementById('slidesContainer');
        if(!container) return;
        container.innerHTML = '';
        currentSlides.forEach((slide, idx) => {
            const div = document.createElement('div');
            div.className = 'slide-item';
            div.innerHTML = `<img src="${slide.image}" onerror="this.src='https://placehold.co/50x50?text=🖼️'"><div class="slide-info"><h4>${escapeHtml(slide.title)}</h4><p>${escapeHtml(slide.text)}</p></div><div class="slide-actions"><button class="edit-btn" data-index="${idx}">✏️</button><button class="delete-btn" data-index="${idx}">🗑️</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.index); editSlide(idx); }));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { if(confirm('دڵنیای لە سڕینەوە؟')) { currentSlides.splice(parseInt(btn.dataset.index), 1); saveCurrentSlides(); renderSlidesList(); clearForm(); } }));
    }
    function saveCurrentSlides() { if(currentSliderType === "index") { indexSlides = currentSlides; } else { sportsSlides = currentSlides; } saveToStorage(); }
    function editSlide(index) {
        const slide = currentSlides[index];
        document.getElementById('editIndex').value = index;
        document.getElementById('slideTitle').value = slide.title;
        document.getElementById('slideText').value = slide.text;
        document.getElementById('slideLink').value = slide.link || '';
        document.getElementById('slideImage').value = slide.image;
        document.getElementById('imagePreview').innerHTML = `<img src="${slide.image}" style="max-width:100%;max-height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML='<span>پێشبینین</span>'">`;
        document.getElementById('formTitle').innerHTML = '✏️ دەستکاری سلایدەر';
        editMode = true;
        updateLivePreview();
    }
    function clearForm() {
        document.getElementById('editIndex').value = '-1';
        document.getElementById('slideTitle').value = '';
        document.getElementById('slideText').value = '';
        document.getElementById('slideLink').value = '';
        document.getElementById('slideImage').value = '';
        document.getElementById('imagePreview').innerHTML = '<span style="color:#aaa;">پێشبینین</span>';
        document.getElementById('formTitle').innerHTML = '➕ زیادکردنی سلایدێکی نوێ';
        editMode = false;
        updateLivePreview();
    }
    function updateLivePreview() {
        const title = document.getElementById('slideTitle').value || 'سەردێڕ';
        const text = document.getElementById('slideText').value || 'تێکست';
        const image = document.getElementById('slideImage').value;
        document.getElementById('previewTitle').innerText = title;
        document.getElementById('previewText').innerText = text;
        const previewImg = document.getElementById('previewImage');
        if(image) { previewImg.src = image; previewImg.style.display = 'block'; } else { previewImg.style.display = 'none'; }
    }
    function escapeHtml(text) { if(!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    document.getElementById('imageUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) { const reader = new FileReader(); reader.onload = function(ev) { const base64 = ev.target.result; document.getElementById('slideImage').value = base64; document.getElementById('imagePreview').innerHTML = `<img src="${base64}" style="max-width:100%;max-height:100%;object-fit:contain;">`; updateLivePreview(); }; reader.readAsDataURL(file); }
    });
    document.getElementById('slideImage').addEventListener('input', function() { const url = this.value; if(url) document.getElementById('imagePreview').innerHTML = `<img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML='<span>وێنە نەدۆزرایەوە</span>'">`; else document.getElementById('imagePreview').innerHTML = '<span>پێشبینین</span>'; updateLivePreview(); });
    document.getElementById('slideTitle').addEventListener('input', updateLivePreview);
    document.getElementById('slideText').addEventListener('input', updateLivePreview);
    document.getElementById('saveBtn').addEventListener('click', () => {
        const editIndex = parseInt(document.getElementById('editIndex').value);
        const title = document.getElementById('slideTitle').value;
        const text = document.getElementById('slideText').value;
        const image = document.getElementById('slideImage').value;
        const link = document.getElementById('slideLink').value;
        if(!title || !text) { alert('تکایە سەردێڕ و تێکست پڕبکەوە'); return; }
        const newSlide = { id: (currentSliderType === "index" ? nextIdIndex++ : nextIdSports++), image: image || 'https://placehold.co/70x70?text=🏆', title, text, link };
        if(editIndex >= 0 && editIndex < currentSlides.length) { newSlide.id = currentSlides[editIndex].id; currentSlides[editIndex] = newSlide; } else { currentSlides.push(newSlide); }
        saveCurrentSlides();
        renderSlidesList();
        clearForm();
        alert('✅ سلایدەرەکە هەڵگیرا!');
    });
    document.getElementById('cancelBtn').addEventListener('click', clearForm);
    document.getElementById('addNewBtn').addEventListener('click', clearForm);
    document.querySelectorAll('.slider-selector-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.slider-selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSliderType = btn.dataset.slider;
            currentSlides = currentSliderType === "index" ? [...indexSlides] : [...sportsSlides];
            renderSlidesList();
            clearForm();
        });
    });
    loadFromStorage();
    renderSlidesList();
</script>
</body>
</html>
