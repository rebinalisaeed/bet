<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>چوونەژوورەوە - Kurdliga</title>

  <style>
    @font-face {
      font-family: 'Kurdliga-Regular';
      src: url('fonts/kurdliga-Reg.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Kurdliga-Bold';
      src: url('fonts/kurdliga-bold.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #021133;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px 22px 18px;
      overflow-x: hidden;
    }

    .login-box {
      width: 100%;
      max-width: 430px;
      text-align: center;
      padding-top: clamp(8px, 5vh, 45px);
    }

    .logo {
      width: min(82%, 330px);
      display: block;
      margin: 0 auto clamp(28px, 5vh, 52px);
    }

    .input-box {
      width: 100%;
      height: 64px;
      border: 2px solid #F5F7FA;
      border-radius: 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      background: transparent;
    }

    .right-icon {
      font-size: 24px;
      color: #F5F7FA;
      margin-left: 12px;
      line-height: 1;
    }

    .input-box input {
      flex: 1;
      min-width: 0;
      background: transparent !important;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 20px;
      text-align: right;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .input-box input::placeholder {
      color: #BFC8D4;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .input-box input:focus {
      outline: none;
      box-shadow: none;
      background: transparent !important;
    }

    .input-box input:-webkit-autofill,
    .input-box input:-webkit-autofill:hover,
    .input-box input:-webkit-autofill:focus {
      -webkit-text-fill-color: #ffffff;
      -webkit-box-shadow: 0 0 0px 1000px #021133 inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    .eye-icon {
      font-size: 24px;
      color: #F5F7FA;
      cursor: pointer;
      margin-right: 12px;
      user-select: none;
      line-height: 1;
    }

    .forgot {
      display: block;
      text-align: left;
      color: #ffffff;
      font-size: 18px;
      text-decoration: none;
      margin: 2px 0 26px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .login-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #00C853;
      color: #ffffff;
      font-size: 24px;
      font-family: 'Kurdliga-Bold', sans-serif;
      cursor: pointer;
      margin-bottom: 22px;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .register-text {
      font-size: 18px;
      color: #ffffff;
      font-family: 'Kurdliga-Regular', sans-serif;
      line-height: 1.8;
    }

    .register-text a {
      color: #00C853;
      font-family: 'Kurdliga-Bold', sans-serif;
      text-decoration: none;
    }

    @media (max-height: 740px) {
      body {
        padding-top: 18px;
      }

      .login-box {
        padding-top: 0;
      }

      .logo {
        width: min(70%, 285px);
        margin-bottom: 22px;
      }

      .input-box {
        height: 58px;
        margin-bottom: 14px;
      }

      .forgot {
        font-size: 16px;
        margin-bottom: 20px;
      }

      .login-btn {
        height: 58px;
        font-size: 22px;
        margin-bottom: 16px;
      }

      .register-text {
        font-size: 16px;
      }
    }

    @media (max-height: 640px) {
      .logo {
        width: min(62%, 250px);
        margin-bottom: 18px;
      }

      .input-box {
        height: 54px;
      }

      .input-box input {
        font-size: 18px;
      }

      .login-btn {
        height: 54px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <form onsubmit="login(event)">

      <div class="input-box">
        <span class="right-icon">👤</span>
        <input type="text" id="username" placeholder="یوزەرناو" required />
      </div>

      <div class="input-box">
        <span class="right-icon">🔒</span>
        <input type="password" id="password" placeholder="وشەی نهێنی" required />
        <span class="eye-icon" onclick="togglePassword()">👁</span>
      </div>

      <a href="forgot-password.html" class="forgot">وشەی نهێنیت لەبیرکردووە؟</a>

      <button type="submit" class="login-btn">چوونەژوورەوە</button>

      <div class="register-text">
        هەژمارت نیە؟ <a href="register.html">ئێستا خۆت تۆماربکە</a>
      </div>

    </form>

  </div>

  <script>
    function togglePassword() {
      const password = document.getElementById("password");
      password.type = password.type === "password" ? "text" : "password";
    }

    function login(event) {
      event.preventDefault();
      window.location.href = "home.html";
    }
  </script>

</body>
</html>
