<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونەژوورەوە - پێشبڕکێی گەل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستایلی تایبەت بە پەڕەی چوونەژوورەوە */
        .auth-body {
            background: linear-gradient(135deg, #0a2f1f 0%, #0a3b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
        }
        .auth-card {
            background: #0f1119e6;
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 28px;
            border: 1px solid #f5b04230;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo {
            max-height: 55px;
            margin-bottom: 12px;
        }
        .auth-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #FFD966, #FF8C42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: 'Kurdliga Bold', sans-serif;
        }
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #ddd;
            font-family: 'Kurdliga Regular', sans-serif;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: #1e2335;
            border: 1px solid #2e3448;
            border-radius: 28px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Kurdliga Regular', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f5b042;
        }
        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.8rem;
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5b042, #ff8c42);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #0a0c12;
            cursor: pointer;
            font-family: 'Kurdliga Bold', sans-serif;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #aaa;
            font-size: 0.85rem;
        }
        .auth-footer a {
            color: #f5b042;
            text-decoration: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f111f;
            padding: 28px;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #f5b042;
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="images/logo.png" alt="Logo" class="auth-logo" onerror="this.src='https://placehold.co/100x55?text=🏆'">
                <h1>✨ چوونەژوورەوە</h1>
                <p>بەخێربێیتەوە! تکایە هەژمارەکەت بەکاربهێنە</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>📱 یوزەرنەیم یان ژمارەی مۆبایل</label>
                    <input type="text" id="loginUsername" placeholder="یوزەرنەیم" required>
                </div>

                <div class="input-group">
                    <label>🔒 پاسوۆرد</label>
                    <input type="password" id="loginPassword" placeholder="پاسوۆردەکەت بنووسە" required>
                </div>

                <button type="submit" class="auth-btn">🚀 چوونەژوورەوە</button>

                <div class="auth-footer">
                    هەژمارت نییە؟ <a href="register.html">ئێستا تۆمار بکە</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if(!username || !password) {
                alert('تکایە یوزەرنەیم و پاسوۆرد پڕبکەوە');
                return;
            }
            
            // پشکنینی بەکارهێنەر لە localStorage
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if(user) {
                // چوونەژوورەوە سەرکەوتوو
                const currentUser = {
                    username: user.username,
                    points: user.points || 1000.000,
                    firstName: user.firstName,
                    lastName: user.lastName
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert(`بەخێربێیت ${user.firstName} ${user.lastName}!`);
                window.location.href = 'index.html';
            } else {
                // هەڵەی چوونەژوورەوە - بۆ دیمۆ هەر ناو و پاسوۆردێک قبوڵ بکە
                if(username && password) {
                    const newUser = {
                        username: username,
                        password: password,
                        firstName: username,
                        lastName: '',
                        points: 1000.000
                    };
                    localStorage.setItem('currentUser', JSON.stringify(newUser));
                    alert(`بەخێربێیت ${username}! (دیمۆ - چوونەژوورەوە)`);
                    window.location.href = 'index.html';
                } else {
                    alert('یوزەرنەیم یان پاسوۆرد هەڵەیە!');
                }
            }
        });
    </script>
</body>
</html>
