<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>چوونەژوورەوە - Kurdliga</title>

  <style>
    @font-face {
      font-family: 'Kurdliga-Regular';
      src: url('fonts/kurdliga-Reg.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Kurdliga-Bold';
      src: url('fonts/kurdliga-bold.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #021133;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      padding: 25px;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .login-box {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .logo {
      width: 85%;
      max-width: 360px;
      margin-bottom: 65px;
    }

    .input-box {
      width: 100%;
      height: 70px;
      border: 2px solid #F5F7FA;
      border-radius: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: transparent;
    }

    .right-icon {
      font-size: 27px;
      color: #F5F7FA;
      margin-left: 15px;
    }

    .input-box input {
      flex: 1;
      background: transparent !important;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 22px;
      text-align: right;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .input-box input::placeholder {
      color: #BFC8D4;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .input-box input:focus {
      outline: none;
      box-shadow: none;
      background: transparent !important;
    }

    .input-box input:-webkit-autofill,
    .input-box input:-webkit-autofill:hover,
    .input-box input:-webkit-autofill:focus {
      -webkit-text-fill-color: #ffffff;
      -webkit-box-shadow: 0 0 0px 1000px #021133 inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    .eye-icon {
      font-size: 27px;
      color: #F5F7FA;
      cursor: pointer;
      margin-right: 15px;
      user-select: none;
    }

    .forgot {
      display: block;
      text-align: left;
      color: #ffffff;
      font-size: 20px;
      text-decoration: none;
      margin-bottom: 36px;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .login-btn {
      width: 100%;
      height: 72px;
      border: none;
      border-radius: 16px;
      background: #00C853;
      color: #ffffff;
      font-size: 28px;
      font-family: 'Kurdliga-Bold', sans-serif;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .register-text {
      font-size: 21px;
      color: #ffffff;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .register-text a {
      color: #00C853;
      font-family: 'Kurdliga-Bold', sans-serif;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <form onsubmit="login(event)">

      <div class="input-box">
        <span class="right-icon">👤</span>
        <input type="text" id="username" placeholder="یوزەرناو" required />
      </div>

      <div class="input-box">
        <span class="right-icon">🔒</span>
        <input type="password" id="password" placeholder="وشەی نهێنی" required />
        <span class="eye-icon" onclick="togglePassword()">👁</span>
      </div>

      <a href="#" class="forgot">وشەی نهێنیت لەبیرکردووە؟</a>

      <button type="submit" class="login-btn">چوونەژوورەوە</button>

      <div class="register-text">
        هەژمارت نیە؟ <a href="register.html">ئێستا خۆت تۆماربکە</a>
      </div>

    </form>

  </div>

  <script>
    function togglePassword() {
      const password = document.getElementById("password");
      password.type = password.type === "password" ? "text" : "password";
    }

    function login(event) {
      event.preventDefault();
      window.location.href = "home.html";
    }
  </script>

</body>
</html>
