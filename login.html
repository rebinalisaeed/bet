<!doctype html><html lang="ku" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>چوونەژوورەوە</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#07131F] text-white min-h-screen"><main class="max-w-md mx-auto p-6 pt-16"><img src="assets/images/logo.png" class="w-64 mx-auto mb-10"><section class="bg-[#102030] rounded-[2rem] p-6 border border-white/10 shadow-2xl"><h1 class="text-2xl font-black mb-6">چوونەژوورەوە</h1><form id="loginForm" class="space-y-4"><input id="email" type="email" required placeholder="ئیمەیڵ" class="w-full p-4 rounded-2xl bg-[#07131F] border border-white/10 outline-none"><input id="password" type="password" required placeholder="وشەی نهێنی" class="w-full p-4 rounded-2xl bg-[#07131F] border border-white/10 outline-none"><button class="w-full p-4 rounded-2xl bg-[#00C853] font-bold">چوونەژوورەوە</button></form><a href="register.html" class="block text-center mt-5 text-[#00C853]">هەژمارت نییە؟ خۆتۆمار بکە</a></section></main><script type="module">import{loginUser,redirectIfLoggedIn}from'./assets/js/auth.js';import{showMessage}from'./assets/js/app.js';redirectIfLoggedIn();loginForm.onsubmit=async e=>{e.preventDefault();try{await loginUser(email.value,password.value)}catch(err){showMessage('ئیمەیڵ یان وشەی نهێنی هەڵەیە','error')}}</script></body></html>
