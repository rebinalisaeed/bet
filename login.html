<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>چوونەژوورەوە - Kurdliga</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login" class="auth-page">
  <main class="auth-container">
    <section class="auth-card">
      <img src="assets/images/logo.png" alt="Kurdliga Logo" class="auth-logo" />

      <form class="auth-form" onsubmit="login(event)">
        <div id="wrap-email">
          <input type="email" id="email" class="auth-input" placeholder="ئیمەیڵ" />
          <div class="error-text" id="emailError"></div>
        </div>

        <div id="wrap-password">
          <div style="position:relative;">
            <input type="password" id="password" class="auth-input" placeholder="وشەی نهێنی" />
            <button type="button" onclick="togglePassword()" style="position:absolute;left:10px;top:5px;width:42px;height:42px;border:none;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;">👁</button>
          </div>
          <div class="error-text" id="passwordError"></div>
        </div>

        <a href="forgot-password.html" class="auth-link" style="text-align:left;">وشەی نهێنیت لەبیرکردووە؟</a>

        <button type="submit" class="auth-btn" id="loginBtn">چوونەژوورەوە</button>

        <div class="auth-footer">
          هەژمارت نییە؟ <a href="register.html" class="auth-link">ئێستا خۆت تۆماربکە</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
