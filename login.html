<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>چوونەژوورەوە - Kurdliga</title>

  
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="login-box">

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <form onsubmit="login(event)">

      <div class="field-wrap" id="wrap-email">
        <div class="input-box" id="emailBox">
          <span class="right-icon">✉️</span>
          <input type="email" id="email" placeholder="ئیمەیڵ" />
        </div>
        <div class="error-text" id="emailError"></div>
      </div>

      <div class="field-wrap" id="wrap-password">
        <div class="input-box" id="passwordBox">
          <span class="right-icon">🔒</span>
          <input type="password" id="password" placeholder="وشەی نهێنی" />
          <span class="eye-icon" onclick="togglePassword()">👁</span>
        </div>
        <div class="error-text" id="passwordError"></div>
      </div>

      <a href="forgot-password.html" class="forgot">وشەی نهێنیت لەبیرکردووە؟</a>

      <button type="submit" class="login-btn" id="loginBtn">چوونەژوورەوە</button>

      <div class="register-text">
        هەژمارت نیە؟ <a href="register.html">ئێستا خۆت تۆماربکە</a>
      </div>

    </form>

  </div>

  <script src="js/login-1.js"></script>

  <script type="module" src="js/login-2.js"></script>

</body>
</html>
