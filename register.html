<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خۆتۆمارکردن - Kurdliga</title>

  <style>
    @font-face {
      font-family: 'Kurdliga-Regular';
      src: url('fonts/kurdliga-Reg.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Kurdliga-Bold';
      src: url('fonts/kurdliga-bold.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #021133;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    body {
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 20px 28px;
      overflow-x: hidden;
    }

    .register-box {
      width: 100%;
      max-width: 430px;
      text-align: center;
      padding-top: 8px;
    }

    .logo {
      width: min(62%, 260px);
      display: block;
      margin: 0 auto 24px;
    }

    .title {
      font-family: 'Kurdliga-Bold', sans-serif;
      font-size: 26px;
      margin-bottom: 22px;
    }

    .field-wrap {
      margin-bottom: 14px;
    }

    .input-box,
    .select-box {
      width: 100%;
      height: 58px;
      border: 2px solid #F5F7FA;
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: transparent;
      transition: 0.2s ease;
    }

    .input-box.error,
    .select-box.error {
      border-color: #ff3b3b;
      box-shadow: 0 0 0 3px rgba(255, 59, 59, 0.15);
    }

    .error-text {
      display: none;
      color: #ff4d4d;
      font-size: 13px;
      text-align: right;
      margin: 7px 8px 0;
      line-height: 1.6;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .field-wrap.show-error .error-text {
      display: block;
    }

    .right-icon {
      font-size: 22px;
      color: #F5F7FA;
      margin-left: 10px;
      line-height: 1;
    }

    input,
    select {
      flex: 1;
      min-width: 0;
      background: transparent !important;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 17px;
      text-align: right;
      font-family: 'Kurdliga-Regular', sans-serif;
      width: 100%;
    }

    select {
      appearance: none;
      cursor: pointer;
      padding-left: 25px;
      background-image:
        linear-gradient(45deg, transparent 50%, #fff 50%),
        linear-gradient(135deg, #fff 50%, transparent 50%);
      background-position: left 8px center, left 2px center;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    option {
      color: #021133;
      background: #ffffff;
      font-family: 'Kurdliga-Regular', sans-serif;
      font-size: 16px;
    }

    input::placeholder {
      color: #BFC8D4;
    }

    input:focus,
    select:focus {
      outline: none;
      box-shadow: none;
      background: transparent !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #ffffff;
      -webkit-box-shadow: 0 0 0px 1000px #021133 inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    .eye-icon {
      font-size: 22px;
      color: #F5F7FA;
      cursor: pointer;
      margin-right: 10px;
      user-select: none;
      line-height: 1;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: right;
      font-size: 15px;
      line-height: 1.8;
      margin: 10px 2px 18px;
      color: #F5F7FA;
    }

    .terms input {
      flex: none;
      width: 18px;
      height: 18px;
      margin-top: 6px;
      accent-color: #00C853;
    }

    .terms a {
      color: #00C853;
      text-decoration: none;
      font-family: 'Kurdliga-Bold', sans-serif;
    }

    .register-btn {
      width: 100%;
      height: 62px;
      border: none;
      border-radius: 16px;
      background: #00C853;
      color: #ffffff;
      font-size: 23px;
      font-family: 'Kurdliga-Bold', sans-serif;
      cursor: pointer;
      margin-bottom: 18px;
    }

    .register-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .login-text {
      font-size: 17px;
      color: #ffffff;
      line-height: 1.8;
    }

    .login-text a {
      color: #00C853;
      font-family: 'Kurdliga-Bold', sans-serif;
      text-decoration: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      color: #021133;
      border-radius: 22px;
      padding: 28px 20px;
      text-align: center;
      font-family: 'Kurdliga-Regular', sans-serif;
    }

    .modal-box h2 {
      font-family: 'Kurdliga-Bold', sans-serif;
      color: #00C853;
      margin-bottom: 10px;
      font-size: 26px;
    }

    .modal-box p {
      font-size: 17px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <div class="register-box">

    <img src="assets/images/logo.png" alt="Kurdliga Logo" class="logo" />

    <h1 class="title">خۆتۆمارکردن</h1>

    <form onsubmit="registerUser(event)">

      <div class="field-wrap" id="wrap-firstName">
        <div class="input-box">
          <span class="right-icon">👤</span>
          <input type="text" id="firstName" placeholder="ناوی یەکەم" />
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-secondName">
        <div class="input-box">
          <span class="right-icon">👤</span>
          <input type="text" id="secondName" placeholder="ناوی دووەم" />
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-username">
        <div class="input-box">
          <span class="right-icon">🏷</span>
          <input type="text" id="username" placeholder="یوزەرناو" />
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-password">
        <div class="input-box">
          <span class="right-icon">🔒</span>
          <input type="password" id="password" placeholder="پاسوۆرد" />
          <span class="eye-icon" onclick="togglePassword('password')">👁</span>
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-confirmPassword">
        <div class="input-box">
          <span class="right-icon">🔒</span>
          <input type="password" id="confirmPassword" placeholder="دووبارە پاسوۆرد" />
          <span class="eye-icon" onclick="togglePassword('confirmPassword')">👁</span>
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-phone">
        <div class="input-box">
          <span class="right-icon">📱</span>
          <input type="tel" id="phone" placeholder="ژمارەی مۆبایل" />
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-email">
        <div class="input-box">
          <span class="right-icon">✉️</span>
          <input type="email" id="email" placeholder="ئیمەیڵ" />
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-country">
        <div class="select-box">
          <span class="right-icon">🌍</span>
          <select id="country" onchange="loadCities()">
            <option value="">وڵات هەڵبژێرە</option>
            <option value="باشوری کوردستان">باشوری کوردستان</option>
            <option value="باکوری کوردستان">باکوری کوردستان</option>
            <option value="ڕۆژهەڵاتی کوردستان">ڕۆژهەڵاتی کوردستان</option>
            <option value="ڕۆژئاوای کوردستان">ڕۆژئاوای کوردستان</option>
          </select>
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-city">
        <div class="select-box">
          <span class="right-icon">🏙</span>
          <select id="city">
            <option value="">سەرەتا وڵات هەڵبژێرە</option>
          </select>
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-nationalId">
        <div class="input-box">
          <span class="right-icon">🪪</span>
          <input type="text" id="nationalId" inputmode="numeric" placeholder="ژمارەی پێناس / کارتی نیشتمانی" />
        </div>
        <div class="error-text"></div>
      </div>

      <div class="field-wrap" id="wrap-terms">
        <label class="terms">
          <input type="checkbox" id="terms" />
          <span>ڕازیم بە <a href="#">مەرج و ڕێساکانی Kurdliga</a></span>
        </label>
        <div class="error-text"></div>
      </div>

      <button type="submit" class="register-btn" id="registerBtn">خۆتۆمارکردن</button>

      <div class="login-text">
        پێشتر هەژمارت هەیە؟ <a href="login.html">چوونەژوورەوە</a>
      </div>

    </form>
  </div>

  <div class="modal" id="successModal">
    <div class="modal-box">
      <h2>سەرکەوتوو بوو</h2>
      <p>تۆمارکردنەکە بە سەرکەوتوویی ئەنجام درا</p>
    </div>
  </div>

  <script>
    const cities = {
      "باشوری کوردستان": ["هەولێر", "سلێمانی", "دهۆک", "هەڵەبجە", "کەرکوک", "موسڵ"],
      "باکوری کوردستان": ["ئامەد", "ئاگری", "وان", "جۆلەمێرگ", "شڕناخ", "مێردین", "مامەکی", "سەمسوور", "سێرت", "بەدلیس", "مووش", "ئەرزنگان", "چەولیگ", "ڕحا", "ئەنتاکیا", "مەرعەش", "ڕەشقەلاس", "قەرس", "ئەرزیڕۆم", "سێواس", "مەلەتی", "ئەردێخان", "ئێلح", "دیلۆک", "خارپێت"],
      "ڕۆژهەڵاتی کوردستان": ["کرماشان", "سنە", "مەهاباد", "ورمێ", "ئیلام", "سەقز", "بۆکان", "مەریوان", "بانە", "پاوە", "پیرانشار", "سەردەشت", "کامیاران", "شنۆ", "جوانڕۆ", "خۆی"],
      "ڕۆژئاوای کوردستان": ["قامیشلۆ", "کۆبانێ", "عەفرین", "حەسەکە", "سەرێ کانیێ", "عاموودا", "دێرک (مالیکیە)", "عەین عیسا", "دەرباسیێ"]
    };

    function loadCities() {
      const country = document.getElementById("country").value;
      const citySelect = document.getElementById("city");

      citySelect.innerHTML = '<option value="">شار هەڵبژێرە</option>';

      if (cities[country]) {
        cities[country].forEach(city => {
          const option = document.createElement("option");
          option.value = city;
          option.textContent = city;
          citySelect.appendChild(option);
        });
      }

      clearError("country");
      clearError("city");
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    function showError(id, message) {
      const wrap = document.getElementById("wrap-" + id);
      const box = wrap.querySelector(".input-box, .select-box");
      const text = wrap.querySelector(".error-text");

      wrap.classList.add("show-error");
      if (box) box.classList.add("error");
      text.textContent = message;
    }

    function clearError(id) {
      const wrap = document.getElementById("wrap-" + id);
      if (!wrap) return;

      const box = wrap.querySelector(".input-box, .select-box");
      const text = wrap.querySelector(".error-text");

      wrap.classList.remove("show-error");
      if (box) box.classList.remove("error");
      text.textContent = "";
    }

    function clearAllErrors() {
      [
        "firstName",
        "secondName",
        "username",
        "password",
        "confirmPassword",
        "phone",
        "email",
        "country",
        "city",
        "nationalId",
        "terms"
      ].forEach(clearError);
    }

    document.addEventListener("input", function(e) {
      if (e.target.id) clearError(e.target.id);
    });

    document.addEventListener("change", function(e) {
      if (e.target.id) clearError(e.target.id);
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      collection,
      query,
      where,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2ENjViKDRHwwBUGTjrDJMrnrQePGhDqY",
      authDomain: "kurdliga1.firebaseapp.com",
      databaseURL: "https://kurdliga1-default-rtdb.firebaseio.com",
      projectId: "kurdliga1",
      storageBucket: "kurdliga1.firebasestorage.app",
      messagingSenderId: "799164130957",
      appId: "1:799164130957:web:a3ff5ec1ccb026ca59a4c4",
      measurementId: "G-8TCVRT6GNK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function checkIfExists(fieldName, value) {
      const q = query(
        collection(db, "users"),
        where(fieldName, "==", value)
      );

      const snapshot = await getDocs(q);
      return !snapshot.empty;
    }

    function scrollToField(id) {
      const wrap = document.getElementById("wrap-" + id);
      if (wrap) {
        wrap.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    window.registerUser = async function(event) {
      event.preventDefault();
      clearAllErrors();

      const registerBtn = document.getElementById("registerBtn");
      registerBtn.disabled = true;
      registerBtn.textContent = "تکایە چاوەڕێ بکە...";

      const firstName = document.getElementById("firstName").value.trim();
      const secondName = document.getElementById("secondName").value.trim();
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const country = document.getElementById("country").value;
      const city = document.getElementById("city").value;
      const nationalId = document.getElementById("nationalId").value.trim();
      const terms = document.getElementById("terms").checked;

      try {
        if (!firstName) {
          showError("firstName", "تکایە ناوی یەکەم بنووسە");
          scrollToField("firstName");
          return;
        }

        if (!secondName) {
          showError("secondName", "تکایە ناوی دووەم بنووسە");
          scrollToField("secondName");
          return;
        }

        if (!username) {
          showError("username", "تکایە یوزەرناو بنووسە");
          scrollToField("username");
          return;
        }

        if (!password) {
          showError("password", "تکایە پاسوۆرد بنووسە");
          scrollToField("password");
          return;
        }

        if (password.length < 6) {
          showError("password", "پاسوۆرد دەبێت لانیکەم ٦ پیت یان ژمارە بێت");
          scrollToField("password");
          return;
        }

        if (!confirmPassword) {
          showError("confirmPassword", "تکایە پاسوۆرد دووبارە بنووسە");
          scrollToField("confirmPassword");
          return;
        }

        if (password !== confirmPassword) {
          showError("confirmPassword", "پاسوۆردەکان وەک یەک نین");
          scrollToField("confirmPassword");
          return;
        }

        if (!phone) {
          showError("phone", "تکایە ژمارەی مۆبایل بنووسە");
          scrollToField("phone");
          return;
        }

        if (!email) {
          showError("email", "تکایە ئیمەیڵ بنووسە");
          scrollToField("email");
          return;
        }

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailPattern.test(email)) {
          showError("email", "ئیمەیڵەکە دروست نییە");
          scrollToField("email");
          return;
        }

        if (!country) {
          showError("country", "تکایە وڵات هەڵبژێرە");
          scrollToField("country");
          return;
        }

        if (!city) {
          showError("city", "تکایە شار هەڵبژێرە");
          scrollToField("city");
          return;
        }

        if (!nationalId) {
          showError("nationalId", "تکایە ژمارەی پێناس بنووسە");
          scrollToField("nationalId");
          return;
        }

        if (!/^[0-9]+$/.test(nationalId)) {
          showError("nationalId", "ژمارەی پێناس دەبێت تەنها ژمارە بێت");
          scrollToField("nationalId");
          return;
        }

        if (!terms) {
          showError("terms", "پێویستە ڕازی بیت بە مەرج و ڕێساکانی Kurdliga");
          scrollToField("terms");
          return;
        }

        const usernameExists = await checkIfExists("username", username);

        if (usernameExists) {
          showError("username", "ئەم یوزەرناوە پێشتر بەکارهاتووە");
          scrollToField("username");
          return;
        }

        const nationalIdExists = await checkIfExists("nationalId", nationalId);

        if (nationalIdExists) {
          showError("nationalId", "ئەم ژمارەی پێناسە پێشتر تۆمارکراوە");
          scrollToField("nationalId");
          return;
        }

        const userCredential = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCredential.user.uid), {
          firstName: firstName,
          secondName: secondName,
          username: username,
          phone: phone,
          email: email,
          country: country,
          city: city,
          nationalId: nationalId,

          coins: 1000,
          diamonds: 0,
          lastDailyReward: null,

          rank: 0,
          badges: [],
          isAdmin: false,
          createdAt: Date.now()
        });

        document.getElementById("successModal").classList.add("show");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1800);

      } catch (error) {
        if (error.code === "auth/email-already-in-use") {
          showError("email", "ئەم ئیمەیڵە پێشتر بەکارهاتووە");
          scrollToField("email");
        } else if (error.code === "auth/invalid-email") {
          showError("email", "ئیمەیڵەکە دروست نییە");
          scrollToField("email");
        } else if (error.code === "auth/weak-password") {
          showError("password", "پاسوۆرد زۆر لاوازە");
          scrollToField("password");
        } else {
          alert("هەڵەیەک ڕوویدا: " + error.message);
        }
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = "خۆتۆمارکردن";
      }
    };
  </script>

</body>
</html>
