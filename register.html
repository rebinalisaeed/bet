<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خۆتۆمارکردن - پێشبڕکێی گەل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-body {
            background: linear-gradient(135deg, #0a2f1f 0%, #0a3b2a 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .auth-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .auth-card {
            background: #0f1119e6;
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 28px;
            border: 1px solid #f5b04230;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo {
            max-height: 55px;
            margin-bottom: 12px;
        }
        .auth-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #FFD966, #FF8C42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: 'Kurdliga Bold', sans-serif;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-group {
            flex: 1;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #ddd;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: #1e2335;
            border: 1px solid #2e3448;
            border-radius: 28px;
            color: white;
            font-size: 0.9rem;
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5b042, #ff8c42);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #0a0c12;
            cursor: pointer;
            margin-top: 15px;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
        .auth-footer a {
            color: #f5b042;
            text-decoration: none;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="images/logo.png" alt="Logo" class="auth-logo" onerror="this.src='https://placehold.co/100x55?text=🏆'">
                <h1>📝 خۆتۆمارکردن</h1>
                <p>بەخێربێیت! هەژمارێکی نوێ دروست بکە</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="input-group">
                        <label>📛 ناوی یەکەم</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="input-group">
                        <label>📛 ناوی دووەم</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>👤 یوزەرنەیم</label>
                    <input type="text" id="username" required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>🔒 پاسوۆرد</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="input-group">
                        <label>🔄 دووبارە پاسوۆرد</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>📱 ژمارەی مۆبایل</label>
                        <input type="tel" id="phone" placeholder="+964XXXXXXXXX">
                    </div>
                    <div class="input-group">
                        <label>📧 ئیمەیڵ</label>
                        <input type="email" id="email">
                    </div>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox" id="termsCheckbox" required>
                    من <strong>مەرج و ڕێساکانی سایتی پێشبینی</strong>م خوێندووەتەوە و ڕازیم
                </label>

                <button type="submit" class="auth-btn">✅ تۆمارکردن</button>

                <div class="auth-footer">
                    هەژمارت هەیە؟ <a href="login.html">چوونەژوورەوە</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheckbox').checked;
            
            if(!firstName || !lastName || !username || !password) {
                alert('تکایە هەموو خانە پێویستەکان پڕبکەوە');
                return;
            }
            if(password !== confirmPass) {
                alert('پاسوۆردەکان یەکسان نین');
                return;
            }
            if(password.length < 4) {
                alert('پاسوۆرد دەبێت لانیکەم 4 پیت بێت');
                return;
            }
            if(!terms) {
                alert('تکایە ڕازی بن بە مەرج و ڕێساکان');
                return;
            }
            
            // تۆمارکردنی بەکارهێنەر
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const existing = users.find(u => u.username === username);
            if(existing) {
                alert('ئەم یوزەرنەیمە هەیە! تکایە یوزەرنەیمێکی تر هەڵبژێرە');
                return;
            }
            
            const newUser = {
                firstName,
                lastName,
                username,
                password,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                points: 1000.000,
                registeredAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('registeredUsers', JSON.stringify(users));
            
            alert(`بەخێربێیت ${firstName} ${lastName}!\nتۆمارکردن سەرکەوتوو بوو. ئێستا دەچیتەوە پەڕەی چوونەژوورەوە`);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
