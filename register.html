<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خۆتۆمارکردن - Kurdliga</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register" class="auth-page">
  <main class="auth-container">
    <section class="auth-card">
      <img src="assets/images/logo.png" alt="Kurdliga Logo" class="auth-logo" />
      <h1 class="auth-title">خۆتۆمارکردن</h1>

      <form class="auth-form" onsubmit="register(event)">

        <div id="wrap-firstName"><input type="text" id="firstName" class="auth-input" placeholder="ناوی یەکەم" /><div class="error-text" id="firstNameError"></div></div>
        <div id="wrap-secondName"><input type="text" id="secondName" class="auth-input" placeholder="ناوی دووەم" /><div class="error-text" id="secondNameError"></div></div>
        <div id="wrap-username"><input type="text" id="username" class="auth-input" placeholder="یوزەرناو" /><div class="error-text" id="usernameError"></div></div>

        <div id="wrap-password">
          <div style="position:relative;">
            <input type="password" id="password" class="auth-input" placeholder="پاسوۆرد" />
            <button type="button" onclick="togglePassword('password')" style="position:absolute;left:10px;top:5px;width:42px;height:42px;border:none;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;">👁</button>
          </div>
          <div class="error-text" id="passwordError"></div>
        </div>

        <div id="wrap-confirmPassword">
          <div style="position:relative;">
            <input type="password" id="confirmPassword" class="auth-input" placeholder="دووبارە پاسوۆرد" />
            <button type="button" onclick="togglePassword('confirmPassword')" style="position:absolute;left:10px;top:5px;width:42px;height:42px;border:none;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;">👁</button>
          </div>
          <div class="error-text" id="confirmPasswordError"></div>
        </div>

        <div id="wrap-phone"><input type="tel" id="phone" class="auth-input" placeholder="ژمارەی مۆبایل" /><div class="error-text" id="phoneError"></div></div>
        <div id="wrap-email"><input type="email" id="email" class="auth-input" placeholder="ئیمەیڵ" /><div class="error-text" id="emailError"></div></div>

        <div id="wrap-country">
          <select id="country" class="auth-input" onchange="loadCities()">
            <option value="">وڵات هەڵبژێرە</option>
            <option value="باشوری کوردستان">باشوری کوردستان</option>
            <option value="باکوری کوردستان">باکوری کوردستان</option>
            <option value="ڕۆژهەڵاتی کوردستان">ڕۆژهەڵاتی کوردستان</option>
            <option value="ڕۆژئاوای کوردستان">ڕۆژئاوای کوردستان</option>
          </select>
          <div class="error-text" id="countryError"></div>
        </div>

        <div id="wrap-city">
          <select id="city" class="auth-input">
            <option value="">سەرەتا وڵات هەڵبژێرە</option>
          </select>
          <div class="error-text" id="cityError"></div>
        </div>

        <div id="wrap-nationalId"><input type="text" id="nationalId" inputmode="numeric" class="auth-input" placeholder="ژمارەی پێناس / کارتی نیشتمانی" /><div class="error-text" id="nationalIdError"></div></div>

        <div id="wrap-terms">
          <label class="auth-footer" style="display:flex;gap:8px;align-items:center;justify-content:center;margin-top:0;">
            <input type="checkbox" id="terms" />
            <span>ڕازیم بە <a href="#" class="auth-link">مەرج و ڕێساکانی Kurdliga</a></span>
          </label>
          <div class="error-text" id="termsError"></div>
        </div>

        <button type="submit" class="auth-btn" id="registerBtn">خۆتۆمارکردن</button>

        <div class="auth-footer">
          پێشتر هەژمارت هەیە؟ <a href="login.html" class="auth-link">چوونەژوورەوە</a>
        </div>
      </form>
    </section>
  </main>

  <div class="modal" id="successModal">
    <div class="modal-box">
      <h2>سەرکەوتوو بوو</h2>
      <p>تۆمارکردنەکە بە سەرکەوتوویی ئەنجام درا</p>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
