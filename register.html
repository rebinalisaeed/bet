<!doctype html><html lang="ku" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>خۆتۆمارکردن</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#07131F] text-white min-h-screen"><main class="max-w-md mx-auto p-6 pt-10"><img src="assets/images/logo.png" class="w-64 mx-auto mb-8"><section class="bg-[#102030] rounded-[2rem] p-6 border border-white/10 shadow-2xl"><h1 class="text-2xl font-black mb-6">خۆتۆمارکردن</h1><form id="registerForm" class="space-y-4"><input id="username" required placeholder="ناوی بەکارهێنەر" class="w-full p-4 rounded-2xl bg-[#07131F] border border-white/10 outline-none"><input id="email" type="email" required placeholder="ئیمەیڵ" class="w-full p-4 rounded-2xl bg-[#07131F] border border-white/10 outline-none"><input id="password" type="password" required minlength="6" placeholder="وشەی نهێنی" class="w-full p-4 rounded-2xl bg-[#07131F] border border-white/10 outline-none"><button class="w-full p-4 rounded-2xl bg-[#00C853] font-bold">دروستکردنی هەژمار</button></form><a href="login.html" class="block text-center mt-5 text-[#00C853]">پێشتر هەژمارت هەیە؟</a></section></main><script type="module">import{registerUser,redirectIfLoggedIn}from'./assets/js/auth.js';import{showMessage}from'./assets/js/app.js';redirectIfLoggedIn();registerForm.onsubmit=async e=>{e.preventDefault();try{await registerUser(username.value,email.value,password.value)}catch(err){showMessage(err.message,'error')}}</script></body></html>
